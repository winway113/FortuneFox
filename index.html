<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --orange: #f39c12; --bg: #121212; --card: #1c1c1c; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .header { height: 60px; background: #1a1a1a; border-bottom: 2px solid var(--orange); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .bal-box { background: #252525; padding: 8px 12px; border-radius: 10px; border: 1px solid #333; font-weight: 800; color: var(--green); }
        .app-container { margin-top: 60px; height: calc(100vh - 60px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; flex-direction: column; gap: 15px; }
        .active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #2a2a2a; width: 100%; text-align: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-main { background: var(--orange); color: black; }
        .btn-sec { background: #333; color: white; margin-top: 10px; }
        .input-box { background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { font-size: 10px; color: #666; display: block; text-transform: uppercase; }
        .input-box input { background: none; border: none; color: white; font-size: 18px; width: 100%; outline: none; font-weight: bold; }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 10px 0; width: 100%; }
        .cell { aspect-ratio: 1/1; background: #252525; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .cell.gem { background: var(--green) !important; }
        .cell.bomb { background: var(--red) !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-box"><span id="balance">0.00</span> ₽</div>
        <div style="font-weight: 900; color: var(--orange);">FORTUNE FOX</div>
        <div style="color:var(--orange); font-weight:bold;">ID: <span id="myid">0</span></div>
    </div>

    <div class="app-container">
        <!-- Вход -->
        <div id="reg-screen" class="screen active" style="text-align:center; padding-top:50px;">
            <div style="font-size: 80px;">🦊</div>
            <h1 style="color:var(--orange);">FortuneFox</h1>
            <p id="welcome-text">Загрузка данных...</p>
            <button class="btn btn-main" style="margin-top:20px;" onclick="showScreen('lobby')">ИГРАТЬ</button>
        </div>

        <!-- Лобби -->
        <div id="lobby" class="screen">
            <div class="grid-2">
                <div class="card" onclick="showScreen('mines-game')">💣<br>МИНЫ</div>
                <div class="card" onclick="showScreen('dice-game')">🎲<br>DICE</div>
            </div>
            <div class="card">🎰 СЛОТЫ (СКОРО)</div>
        </div>

        <!-- DICE -->
        <div id="dice-game" class="screen">
            <div class="card">
                <h2 id="d-result">Удачи!</h2>
                <div class="input-box"><label>Ставка</label><input type="number" id="d-bet" value="10"></div>
                <div class="input-box"><label>Шанс %</label><input type="number" id="d-chance" value="50"></div>
                <div class="grid-2">
                    <button class="btn btn-main" onclick="playDice('less')">МЕНЬШЕ</button>
                    <button class="btn btn-main" onclick="playDice('more')">БОЛЬШЕ</button>
                </div>
            </div>
            <button class="btn btn-sec" onclick="showScreen('lobby')">В ЛОББИ</button>
        </div>

        <!-- МИНЫ -->
        <div id="mines-game" class="screen">
            <div class="card">
                <h2 id="m-coeff">x0.00</h2>
                <div class="mines-grid" id="m-grid"></div>
                <div class="input-box"><label>Ставка</label><input type="number" id="m-bet" value="10"></div>
                <button class="btn btn-main" id="m-start" onclick="startMines()">ИГРАТЬ</button>
                <button class="btn btn-main" id="m-cash" style="display:none; background:var(--green);" onclick="cashMines()">ЗАБРАТЬ</button>
            </div>
            <button class="btn btn-sec" onclick="showScreen('lobby')">В ЛОББИ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 0.00;
        let userId = 0;
        
        // ВСТАВЬ СВОЮ ССЫЛКУ ИЗ NGROK (БЕЗ СЛОВ localhost И СТРЕЛОЧЕК)
        const SERVER_URL = "https://dennise-ulcerative-kolby.ngrok-free.dev -> http://localhost:8000"; 

        window.onload = () => {
            tg.expand();
            tg.ready();
            const params = new URLSearchParams(window.location.search);
            userId = parseInt(params.get('id') || 0);
            balance = parseFloat(params.get('bal') || 0);

            document.getElementById('balance').innerText = balance.toFixed(2);
            document.getElementById('myid').innerText = userId;
            document.getElementById('welcome-text').innerText = "Баланс: " + balance.toFixed(2) + " ₽";
        };

        function updateDB() {
            document.getElementById('balance').innerText = balance.toFixed(2);
            if (userId === 0) return;

            fetch(`${SERVER_URL}/update_balance`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, new_balance: balance })
            })
            .then(res => res.json())
            .catch(e => console.error("Ошибка сохранения:", e));
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- ЛОГИКА DICE ---
        function playDice(mode) {
            let bet = parseFloat(document.getElementById('d-bet').value);
            let chance = parseFloat(document.getElementById('d-chance').value);
            if(bet > balance || bet <= 0) return alert("Мало денег!");
            
            balance -= bet;
            let roll = Math.random() * 100;
            let win = mode === 'less' ? roll <= chance : roll >= (100 - chance);
            if(win) balance += bet * (95 / chance);
            
            document.getElementById('d-result').innerText = win ? "ВЫИГРЫШ!" : "ПРОИГРЫШ";
            updateDB();
        }

        // --- ЛОГИКА МИНЫ ---
        let mData = {active: false, bet: 0, mines: [], opened: 0};
        function startMines() {
            let bet = parseFloat(document.getElementById('m-bet').value);
            if(bet > balance || bet <= 0) return alert("Мало денег!");
            balance -= bet;
            mData = {active: true, bet: bet, mines: Array(25).fill(0).map(() => Math.random() < 0.2 ? 1 : 0), opened: 0};
            document.getElementById('m-start').style.display = 'none';
            document.getElementById('m-cash').style.display = 'block';
            renderMines();
            updateDB();
        }

        function renderMines() {
            const grid = document.getElementById('m-grid');
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => clickMine(i, cell);
                grid.appendChild(cell);
            }
        }

        function clickMine(i, el) {
            if(!mData.active || el.innerText !== '') return;
            if(mData.mines[i] === 1) {
                el.classList.add('bomb'); el.innerText = '💣';
                mData.active = false;
                alert("БОМБА!");
                setTimeout(() => {
                    showScreen('lobby');
                    document.getElementById('m-start').style.display = 'block';
                    document.getElementById('m-cash').style.display = 'none';
                }, 1000);
            } else {
                el.classList.add('gem'); el.innerText = '💎';
                mData.opened++;
                document.getElementById('m-coeff').innerText = 'x' + (1 + mData.opened * 0.2).toFixed(2);
            }
        }

        function cashMines() {
            let coeff = 1 + mData.opened * 0.2;
            balance += mData.bet * coeff;
            mData.active = false;
            document.getElementById('m-start').style.display = 'block';
            document.getElementById('m-cash').style.display = 'none';
            updateDB();
            alert("Забрали " + (mData.bet * coeff).toFixed(2) + " ₽");
        }
    </script>
</body>
</html>
