<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #1e1e1e; border-bottom: 1px solid #f39c12; height: 60px; position: sticky; top: 0; z-index: 100; }
        .balance-container { display: flex; align-items: center; gap: 8px; }
        .balance-badge { background: #2b2b2b; padding: 6px 12px; border-radius: 8px; border: 1px solid #333; }
        .balance-amount { color: #2ecc71; font-weight: 800; font-size: 16px; }
        .add-balance-btn { background: #f39c12; color: #000; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: none; font-size: 20px; }
        
        .main-container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .screen { display: none; flex-direction: column; gap: 15px; width: 100%; }
        .active-screen { display: flex; }

        /* Модальное окно */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1e1e1e; border: 1px solid #f39c12; border-radius: 15px; width: 100%; max-width: 320px; padding: 25px; text-align: center; }

        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .game-card { background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #f39c12; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 80px; }

        /* DICE элементы */
        .dice-res-win { background: #2ecc71; color: white; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; margin-top: 15px; font-size: 18px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .dice-res-lose { background: #ff7675; color: white; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; margin-top: 15px; font-size: 18px; }

        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 350px; margin: 0 auto; }
        .mine-cell { aspect-ratio: 1/1; background: #2b2b2b; border-radius: 8px; border: 2px solid #3d3d3d; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .mine-cell.open-gem { background: #2ecc71; border-color: #27ae60; }
        .mine-cell.open-bomb { background: #ff7675; border-color: #d63031; }

        .roulette-wrapper { width: 100%; position: relative; margin: 10px 0; height: 100px; }
        .roulette-container { width: 100%; height: 100px; background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #f39c12; position: relative; }
        .roulette-pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 100%; background: #f39c12; z-index: 10; }
        .roulette-tape { display: flex; position: absolute; height: 100%; left: 0; }
        .r-item { min-width: 80px; width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid #333; background: #252525; font-weight: bold; }

        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-main { background: #f39c12; color: #000; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-back { background: transparent; color: #777; margin-top: 5px; }

        .promo-input { width: 100%; padding: 12px; background: #2b2b2b; border: 1px solid #444; border-radius: 8px; color: #fff; outline: none; }
        .info-card { background: #1e1e1e; padding: 15px; border-radius: 12px; border-left: 4px solid #f39c12; width: 100%; }

        .menu-btn { position: fixed; bottom: 20px; left: 20px; background: #f39c12; width: 50px; height: 50px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; z-index: 100; }
        .menu-btn span { width: 25px; height: 3px; background: #fff; border-radius: 2px; }
        .side-menu { position: fixed; top: 0; left: -100%; width: 75%; height: 100%; background: #1e1e1e; z-index: 1000; transition: 0.3s; border-right: 2px solid #f39c12; padding: 20px; }
        .side-menu.open { left: 0; }
        .menu-link { display: block; padding: 15px; color: #fff; text-decoration: none; font-weight: bold; border-bottom: 1px solid #333; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container">
            <div class="balance-badge"><span class="balance-amount" id="balance">0.00</span> ₽</div>
            <button class="add-balance-btn" onclick="openWallet()">+</button>
        </div>
        <div style="color:#f39c12; font-weight:900; font-size: 14px;">FORTUNEFOX</div>
        <img id="user-pic" style="width:32px; height:32px; border-radius:50%; border: 1px solid #f39c12;" src="https://ui-avatars.com/api/?name=U">
    </div>

    <!-- МОДАЛКА КОШЕЛЬКА -->
    <div class="modal-overlay" id="wallet-modal">
        <div class="modal-content">
            <h2 style="color:#f39c12; margin-bottom:20px;">КОШЕЛЕК</h2>
            <button class="btn btn-success" onclick="walletAction('dep')">ПОПОЛНИТЬ</button>
            <button class="btn btn-danger" onclick="walletAction('out')">ВЫВЕСТИ</button>
            <button class="btn btn-back" onclick="closeWallet()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="main-container">
        
        <!-- ГЛАВНАЯ -->
        <div id="lobby" class="screen active-screen">
            <div class="game-card" style="min-height: 120px; font-size: 20px;" onclick="alert('В разработке...')">🎰 СЛОТЫ</div>
            <div class="grid-2col">
                <div class="game-card" onclick="showScreen('mines-game')">💣 МИНЫ</div>
                <div class="game-card" onclick="showScreen('dice-game')">🎲 DICE</div>
            </div>
            <div class="game-card" onclick="showScreen('cases-game')">📦 КЕЙСЫ</div>
        </div>

        <!-- DICE -->
        <div id="dice-game" class="screen">
            <div id="d-possible" style="font-size:45px; color:#f39c12; text-align:center; font-weight:bold; margin:10px 0;">20.00</div>
            <div class="grid-2col">
                <div><label style="font-size:10px; color:#777;">СТАВКА</label><input type="number" id="d-bet" value="10" class="promo-input" oninput="updDiceWin()"></div>
                <div><label style="font-size:10px; color:#777;">ШАНС %</label><input type="number" id="d-chance" value="50" class="promo-input" oninput="updDiceWin()"></div>
            </div>
            <div class="grid-2col" style="margin-top:10px;">
                <button class="btn btn-main" onclick="playDice('less')">МЕНЬШЕ</button>
                <button class="btn btn-main" onclick="playDice('more')">БОЛЬШЕ</button>
            </div>
            <!-- Поле результата -->
            <div id="d-res-plate" style="display:none;"></div>
            
            <button class="btn btn-back" onclick="exitToLobby()">НАЗАД</button>
        </div>

        <!-- МИНЫ -->
        <div id="mines-game" class="screen">
            <div id="m-coeff" style="text-align:center; font-size:24px; color:#f39c12; font-weight:bold;">x0.00</div>
            <div class="mines-grid" id="m-grid"></div>
            <div class="grid-2col">
                <div><label style="font-size:10px; color:#777;">СТАВКА</label><input type="number" id="m-bet" value="10" class="promo-input"></div>
                <div><label style="font-size:10px; color:#777;">БОМБЫ</label><input type="number" id="m-bombs" value="3" class="promo-input"></div>
            </div>
            <button class="btn btn-main" id="m-start-btn" onclick="startMines()">ИГРАТЬ</button>
            <button class="btn btn-success" id="m-cash-btn" style="display:none;" onclick="cashoutMines()">ЗАБРАТЬ</button>
            <button class="btn btn-back" onclick="exitToLobby()">НАЗАД</button>
        </div>

        <!-- КЕЙСЫ -->
        <div id="cases-game" class="screen">
            <div id="cases-grid" class="grid-2col">
                <div class="game-card" onclick="viewCase('c1')">📦 10 ₽</div>
                <div class="game-card" onclick="viewCase('c2')">📦 50 ₽</div>
                <div class="game-card" onclick="viewCase('c3')">📦 150 ₽</div>
                <div class="game-card" onclick="viewCase('fox')" style="border-color:#f1c40f;">🦊 5000 ₽</div>
            </div>
            <div id="case-view" style="display:none; flex-direction:column; align-items:center;">
                <div class="roulette-wrapper">
                    <div class="roulette-pointer"></div>
                    <div class="roulette-container"><div class="roulette-tape" id="tape"></div></div>
                </div>
                <button class="btn btn-main" id="open-btn" onclick="startCase()">ОТКРЫТЬ</button>
                <button class="btn btn-back" onclick="backToCases()">К СПИСКУ</button>
            </div>
        </div>

        <!-- БОНУСЫ -->
        <div id="bonus-screen" class="screen">
            <div class="info-card">
                <h4 style="margin:0 0 10px 0;">ПРОМОКОД</h4>
                <input type="text" id="promo-code" class="promo-input" placeholder="Введите код">
                <button class="btn btn-main" style="margin-top:10px;" onclick="alert('Код не найден')">АКТИВИРОВАТЬ</button>
            </div>
            <div class="info-card">
                <h4 style="margin:0 0 5px 0;">ЕЖЕДНЕВНЫЙ БОНУС</h4>
                <button class="btn btn-main" id="daily-btn" onclick="getDailyBonus()">ПОЛУЧИТЬ</button>
            </div>
            <div class="info-card">
                <h4 style="margin:0 0 10px 0;">ЗАДАНИЯ</h4>
                <p style="font-size:12px; color:#555; text-align:center;">Заданий пока нет</p>
            </div>
            <button class="btn btn-back" onclick="exitToLobby()">НАЗАД</button>
        </div>

        <!-- РЕФЕРАЛЫ -->
        <div id="ref-screen" class="screen">
            <div class="info-card">
                <h4 style="margin:0 0 10px 0;">ВАША ССЫЛКА</h4>
                <div id="ref-link" style="font-size:11px; background:#121212; padding:10px; border-radius:8px; border:1px dashed #f39c12; word-break:break-all;">https://t.me/FortuneFox_Bot?start=0</div>
                <button class="btn btn-main" style="margin-top:10px;" onclick="copyRef()">КОПИРОВАТЬ</button>
            </div>
            <button class="btn btn-back" onclick="exitToLobby()">НАЗАД</button>
        </div>

    </div>

    <div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="side-menu" id="side-menu">
        <h2 style="color:#f39c12; margin-top:0;">FortuneFox</h2>
        <a href="#" class="menu-link" onclick="showScreen('lobby'); toggleMenu()">🎰 ИГРЫ</a>
        <a href="#" class="menu-link" onclick="showScreen('bonus-screen'); toggleMenu()">🎁 БОНУСЫ</a>
        <a href="#" class="menu-link" onclick="showScreen('ref-screen'); toggleMenu()">👥 РЕФЕРАЛЫ</a>
        <a href="https://t.me/FortuneFox_support" class="menu-link" target="_blank">🛠 ПОДДЕРЖКА</a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let balance = 100.00;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || "0000";
        document.getElementById('ref-link').innerText = "https://t.me/FortuneFox_Bot?start=" + userId;

        function updateBal() { document.getElementById('balance').innerText = balance.toFixed(2); }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        
        function openWallet() { document.getElementById('wallet-modal').style.display = 'flex'; }
        function closeWallet() { document.getElementById('wallet-modal').style.display = 'none'; }
        function walletAction(type) { closeWallet(); tg.sendData(JSON.stringify({action: type})); }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            if(id === 'mines-game') initMinesGrid();
        }
        function exitToLobby() { showScreen('lobby'); }

        // --- DICE ЛОГИКА ---
        function updDiceWin() {
            let b = parseFloat(document.getElementById('d-bet').value) || 0;
            let c = parseFloat(document.getElementById('d-chance').value) || 1;
            document.getElementById('d-possible').innerText = (b * (95/c)).toFixed(2);
        }

        function playDice(t) {
            let b = parseFloat(document.getElementById('d-bet').value);
            let c = parseFloat(document.getElementById('d-chance').value);
            if(b > balance || b <= 0) { alert("Недостаточно баланса!"); return; }
            balance -= b;
            
            // Число для проверки выигрыша (0-100)
            let r = Math.random() * 100;
            let win = (t === 'less') ? (r < c) : (r >= (100 - c));
            
            let p = document.getElementById('d-res-plate');
            p.style.display = 'block';
            
            if(win) {
                let winAmt = b * (95/c);
                balance += winAmt;
                // Красивое зеленое окно при выигрыше
                p.className = 'dice-res-win';
                p.innerText = "Выиграли " + winAmt.toFixed(2);
            } else {
                // Большое случайное число (билет) при проигрыше
                let ticket = Math.floor(Math.random() * 900000) + 100000;
                p.className = 'dice-res-lose';
                p.innerText = "Проиграли " + ticket;
            }
            updateBal();
        }

        // --- ОСТАЛЬНЫЕ ИГРЫ ---
        function getDailyBonus() {
            let last = localStorage.getItem('lastBonus');
            let now = new Date().getTime();
            if(last && now - last < 86400000) { alert('Раз в 24 часа!'); return; }
            let amt = (Math.random() * 24 + 1).toFixed(2);
            balance += parseFloat(amt); updateBal();
            localStorage.setItem('lastBonus', now);
            alert("Зачислено " + amt + " ₽!");
        }

        let mState = { active: false, bet: 0, bombs: 0, opened: 0, grid: [] };
        function initMinesGrid() {
            const grid = document.getElementById('m-grid'); grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div'); cell.className = 'mine-cell';
                cell.onclick = () => clickMines(i); grid.appendChild(cell);
            }
        }
        function startMines() {
            let b = parseFloat(document.getElementById('m-bet').value);
            let n = parseInt(document.getElementById('m-bombs').value);
            if(b > balance || n < 2 || n > 24) return;
            balance -= b; updateBal();
            mState = { active: true, bet: b, bombs: n, opened: 0, grid: Array(25).fill('gem') };
            let cnt = 0; while(cnt < n) { let r = Math.floor(Math.random()*25); if(mState.grid[r]==='gem'){mState.grid[r]='bomb'; cnt++;} }
            document.getElementById('m-start-btn').style.display = 'none';
            document.getElementById('m-cash-btn').style.display = 'block';
            initMinesGrid();
        }
        function clickMines(i) {
            if(!mState.active) return;
            let cell = document.getElementById('m-grid').children[i];
            if(cell.classList.contains('open-gem')) return;
            if(mState.grid[i] === 'bomb') {
                cell.classList.add('open-bomb'); cell.innerText = '💣';
                mState.active = false; setTimeout(() => { alert('БОМБА!'); resetMines(); }, 500);
            } else {
                cell.classList.add('open-gem'); cell.innerText = '💎';
                mState.opened++; document.getElementById('m-coeff').innerText = 'x' + getMult();
            }
        }
        function getMult() {
            let n=25, k=mState.bombs, o=mState.opened; if(o===0) return 0;
            let res = 0.97; for(let i=0; i<o; i++) res *= (n-i)/(n-k-i);
            return res.toFixed(2);
        }
        function cashoutMines() {
            let win = mState.bet * getMult(); balance += win; updateBal();
            alert('Выиграно: ' + win.toFixed(2) + ' ₽'); resetMines();
        }
        function resetMines() {
            mState.active = false;
            document.getElementById('m-start-btn').style.display = 'block';
            document.getElementById('m-cash-btn').style.display = 'none';
        }

        const caseDB = {'c1': {p: 10, items: [2, 5, 10, 20], w: [40, 30, 25, 5]}, 'c2': {p: 50, items: [10, 25, 50, 150], w: [40, 35, 20, 5]}, 'c3': {p: 150, items: [50, 100, 200, 500], w: [40, 35, 20, 5]}, 'fox': {p: 5000, items: [2500, 5000, 15000, 50000], w: [60, 25, 10, 5]}};
        let curCase = null, isSpinning = false;
        function viewCase(id) { curCase = caseDB[id]; document.getElementById('cases-grid').style.display='none'; document.getElementById('case-view').style.display='flex'; resetTape(); }
        function resetTape() { let t = document.getElementById('tape'); t.style.transition = 'none'; t.style.transform = 'translateX(0px)'; t.innerHTML = ''; for(let i=0; i<85; i++) { let pr = curCase.items[Math.floor(Math.random()*curCase.items.length)]; t.innerHTML += `<div class="r-item"><b>${pr}</b></div>`; } }
        function startCase() {
            if(balance < curCase.p || isSpinning) return;
            isSpinning = true; balance -= curCase.p; updateBal();
            let t = document.getElementById('tape'); let win = getPr(curCase.items, curCase.w); let winIdx = 70; 
            t.children[winIdx].innerHTML = `<b>${win}</b>`;
            let itemW = 80; let containerW = document.querySelector('.roulette-container').offsetWidth;
            let centerPos = (winIdx * itemW) - (containerW / 2) + (itemW / 2);
            t.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)'; t.style.transform = `translateX(-${centerPos}px)`;
            setTimeout(() => { balance += win; updateBal(); alert('Приз: ' + win + '₽'); isSpinning = false; }, 7200);
        }
        function getPr(p, w) { let s = w.reduce((a,b)=>a+b,0); let r = Math.random()*s; for(let i=0; i<p.length; i++){ if(r<w[i]) return p[i]; r-=w[i]; } return p[p.length-1]; }
        function backToCases() { if(!isSpinning) { document.getElementById('cases-grid').style.display='grid'; document.getElementById('case-view').style.display='none'; } }
        function copyRef() { navigator.clipboard.writeText(document.getElementById('ref-link').innerText); alert('Скопировано!'); }

        updateBal();
    </script>
</body>
</html>
