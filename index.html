<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #1e1e1e; border-bottom: 2px solid #f39c12; height: 60px; position: sticky; top: 0; z-index: 100; }
        .balance-badge { background: #2b2b2b; padding: 6px 12px; border-radius: 8px; border: 1px solid #3d3d3d; }
        .balance-amount { color: #2ecc71; font-weight: 800; font-size: 16px; }
        
        /* Контейнер */
        .main-container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .screen { display: none; flex-direction: column; gap: 15px; width: 100%; }
        .active-screen { display: flex; }
        
        /* Карточки игр */
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .game-card { background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; font-weight: bold; cursor: pointer; transition: 0.2s; border-bottom: 3px solid #f39c12; }
        .game-card:active { transform: scale(0.95); background: #252525; }

        /* Управление ставками (Dice/Mines) */
        .control-group { background: #1e1e1e; padding: 10px; border-radius: 12px; display: flex; flex-direction: column; gap: 5px; }
        .btn-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 5px; }
        .small-btn { background: #333; border: none; color: #bbb; padding: 5px; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .small-btn:active { background: #f39c12; color: black; }

        /* Поле Мины */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 320px; margin: 0 auto; }
        .mine-cell { aspect-ratio: 1/1; background: #2b2b2b; border-radius: 8px; border-bottom: 3px solid #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .mine-cell:active { transform: scale(0.9); }
        .mine-cell.open-gem { background: #2ecc71; border-color: #27ae60; animation: pop 0.3s; }
        .mine-cell.open-bomb { background: #ff7675; border-color: #d63031; animation: shake 0.3s; }
        .mine-cell.reveal-bomb { opacity: 0.6; background: #ff7675; }

        /* Кейсы */
        .roulette-wrapper { width: 100%; position: relative; margin: 20px 0; height: 100px; }
        .roulette-container { width: 100%; height: 100px; background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 2px solid #f39c12; position: relative; }.roulette-pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: #f39c12; z-index: 10; }
        .roulette-tape { display: flex; position: absolute; height: 100%; left: 0; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .r-item { min-width: 80px; width: 80px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #333; background: #252525; font-weight: bold; }

        /* Кнопки */
        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; transition: 0.2s; border-bottom: 4px solid rgba(0,0,0,0.2); }
        .btn-main { background: #f39c12; color: #000; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-back { background: transparent; color: #777; margin-top: 5px; }
        .btn:active { transform: translateY(2px); border-bottom-width: 0; }
        
        .promo-input { width: 100%; padding: 12px; background: #2b2b2b; border: 1px solid #444; border-radius: 8px; color: #fff; text-align: center; font-weight: bold; }

        /* Меню */
        .menu-btn { position: fixed; bottom: 20px; left: 20px; background: #f39c12; width: 50px; height: 50px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; z-index: 100; }
        .menu-btn span { width: 25px; height: 3px; background: #000; border-radius: 2px; }
        .side-menu { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: #1e1e1e; z-index: 1000; transition: 0.3s; border-right: 3px solid #f39c12; padding: 20px; }
        .side-menu.open { left: 0; }

        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance-badge"><span class="balance-amount" id="balance">0.00</span> ₽</div>
        <div style="color:#f39c12; font-weight:900; letter-spacing: 1px;">FORTUNEFOX</div>
        <div id="myid" style="font-size: 10px; color: #555;">ID: 0</div>
    </div>

    <div class="main-container">
        <!-- ЛОББИ -->
        <div id="lobby" class="screen active-screen">
            <div class="game-card" style="padding: 40px; font-size: 22px; background: linear-gradient(45deg, #1e1e1e, #2c3e50); border-color: #f1c40f;">🎰 СЛОТЫ <br><small style="font-size: 10px; color: #f39c12;">В РАЗРАБОТКЕ</small></div>
            <div class="grid-2col">
                <div class="game-card" onclick="showScreen('mines-game')">💣 МИНЫ</div>
                <div class="game-card" onclick="showScreen('dice-game')">🎲 DICE</div>
            </div>
            <div class="game-card" onclick="showScreen('cases-game')">📦 КЕЙСЫ</div>
        </div>

        <!-- ИГРА: МИНЫ -->
        <div id="mines-game" class="screen">
            <div style="display: flex; justify-content: space-around; background: #1e1e1e; padding: 10px; border-radius: 10px; border-bottom: 2px solid #f39c12;">
                <div style="text-align: center;"><small style="color:#777">МНОЖИТЕЛЬ</small><div id="m-coeff" style="color:#f39c12; font-weight:bold; font-size:18px;">x0.00</div></div>
                <div style="text-align: center;"><small style="color:#777">СЛЕДУЮЩИЙ</small><div id="m-next" style="color:#2ecc71; font-weight:bold; font-size:18px;">x1.14</div></div>
            </div>
            
            <div class="mines-grid" id="m-grid"></div>

            <div class="control-group">
                <label style="font-size: 11px; color: #777;">СТАВКА</label>
                <input type="number" id="m-bet" value="10" class="promo-input">
                <div class="btn-row">
                    <button class="small-btn" onclick="adjust('m-bet', 'min')">MIN</button>
                    <button class="small-btn" onclick="adjust('m-bet', '/2')">/2</button>
                    <button class="small-btn" onclick="adjust('m-bet', 'x2')">x2</button>
                    <button class="small-btn" onclick="adjust('m-bet', 'max')">MAX</button>
                </div>
            </div>

            <div class="control-group">
                <label style="font-size: 11px; color: #777;">КОЛ-ВО БОМБ (1-24)</label>
                <input type="number" id="m-bombs" value="3" class="promo-input">
            </div>

            <button class="btn btn-main" id="m-start-btn" onclick="startMines()">ИГРАТЬ</button>
            <button class="btn btn-success" id="m-cash-btn" style="display:none;" onclick="cashoutMines()">ЗАБРАТЬ</button>
            <button class="btn btn-back" onclick="exitToLobby()">НАЗАД</button>
        </div>

        <!-- ИГРА: DICE -->
        <div id="dice-game" class="screen">
            <div id="d-possible" style="font-size:45px; color:#f39c12; text-align:center; font-weight:bold; margin:10px 0; text-shadow: 0 0 15px rgba(243, 156, 18, 0.3);">20.00</div>
            
            <div class="control-group">
                <label style="font-size: 11px; color: #777;">СТАВКА</label>
                <input type="number" id="d-bet" value="10" class="promo-input" oninput="updDiceWin()">
                <div class="btn-row">
                    <button class="small-btn" onclick="adjust('d-bet', 'min')">MIN</button>
                    <button class="small-btn" onclick="adjust('d-bet', '/2')">/2</button>
                    <button class="small-btn" onclick="adjust('d-bet', 'x2')">x2</button>
                    <button class="small-btn" onclick="adjust('d-bet', 'max')">MAX</button>
                </div>
            </div>

            <div class="control-group">
                <label style="font-size: 11px; color: #777;">ШАНС %</label>
                <input type="number" id="d-chance" value="50" class="promo-input" oninput="updDiceWin()">
                <div class="btn-row">
                    <button class="small-btn" onclick="adjust('d-chance', 'min_ch')">1%</button>
                    <button class="small-btn" onclick="adjust('d-chance', '/2')">/2</button>
                    <button class="small-btn" onclick="adjust('d-chance', 'x2')">x2</button>
                    <button class="small-btn" onclick="adjust('d-chance', 'max_ch')">95%</button>
                </div>
            </div>

            <div class="grid-2col" style="margin-top:10px;">
                <button class="btn btn-main" onclick="playDice('less')">МЕНЬШЕ</button>
                <button class="btn btn-main" onclick="playDice('more')">БОЛЬШЕ</button>
            </div>
            <div id="d-res-plate" style="padding:15px; border-radius:10px; text-align:center; display:none; font-weight:bold; margin-top:10px;"></div>
            <button class="btn btn-back" onclick="exitToLobby()">НАЗАД</button>
        </div>

        <!-- ИГРА: КЕЙСЫ -->
        <div id="cases-game" class="screen">
            <div id="cases-grid" class="grid-2col">
                <!-- Отрисуется через JS -->
            </div>

            <div id="case-view" style="display:none; flex-direction:column; align-items:center;">
                <h3 id="case-title" style="color:#f39c12">КЕЙС</h3>
                <div class="roulette-wrapper">
                    <div class="roulette-pointer"></div>
                    <div class="roulette-container"><div class="roulette-tape" id="tape"></div></div>
                </div>
                <div style="display:flex; gap:10px; width:100%">
                   <button class="btn btn-main" id="open-btn" onclick="startCase(false)">ОТКРЫТЬ</button>
                   <button class="btn btn-main" style="background:#e67e22" onclick="startCase(true)">⚡️ БЫСТРО</button>
                </div>
                <button class="btn btn-back" onclick="backToCases()">К СПИСКУ</button>
                
                <div style="margin-top:20px; width:100%">
                    <p style="font-size:12px; color:#777; text-align:center;">СОДЕРЖИМОЕ КЕЙСА:</p>
                    <div id="case-items-preview" style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="side-menu" id="side-menu">
        <h2 style="color:#f39c12; margin-top:0;">FortuneFox</h2>
        <a href="#" class="menu-link" style="display:block; padding:15px; color:#fff; text-decoration:none; font-weight:bold; border-bottom:1px solid #333;" onclick="exitToLobby(); toggleMenu()">🎰 ИГРЫ</a>
        <a href="#" class="menu-link" style="display:block; padding:15px; color:#fff; text-decoration:none; font-weight:bold; border-bottom:1px solid #333;" onclick="alert('Скоро!'); toggleMenu()">🎁 БОНУСЫ</a>
        <a href="#" class="menu-link" style="display:block; padding:15px; color:#fff; text-decoration:none; font-weight:bold; border-bottom:1px solid #333;" onclick="alert('Поддержка: @admin'); toggleMenu()">💬 FAQ</a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let balance = 0.00;
        let userId = 0;
        const SERVER_URL = "https://fortune-fox.fun"; // ЗАМЕНИ НА СВОЙ URL BACKEND

        // Настройка кейсов
        const caseDB = {
            'c1': {n: 'НОВИЧОК', p: 10, items: [1, 3, 8, 12, 25, 50, 100, 250]},
            'c2': {n: 'ОБЫЧНЫЙ', p: 50, items: [5, 15, 40, 55, 100, 250, 500, 1000]},
            'c3': {n: 'СТАНДАРТ', p: 100, items: [10, 30, 85, 120, 200, 500, 1500, 3000]},
            'c4': {n: 'СЕРЕБРО', p: 150, items: [15, 50, 130, 170, 350, 800, 2000, 4500]},
            'c5': {n: 'ЗОЛОТО', p: 250, items: [25, 100, 220, 300, 600, 1500, 4000, 8000]},
            'fox': {n: 'FOX 🦊', p: 5000, items: [500, 2000, 4500, 6000, 12000, 20000, 25000, 30000]}
        };

        function updateBal() { document.getElementById('balance').innerText = balance.toFixed(2); }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            if(id === 'mines-game') initMinesGrid();
            if(id === 'cases-game') renderCases();
        }
        function exitToLobby() { showScreen('lobby'); }

        // Универсальная функция для кнопок MIN, X2 и т.д.
        function adjust(inputId, type) {
            let el = document.getElementById(inputId);
            let val = parseFloat(el.value) || 0;
            if(type === 'min') el.value = 1;
            if(type === '/2') el.value = (val / 2).toFixed(2);
            if(type === 'x2') el.value = (val * 2).toFixed(2);
            if(type === 'max') el.value = Math.floor(balance);
            if(type === 'min_ch') el.value = 1;
            if(type === 'max_ch') el.value = 95;
            if(inputId === 'd-bet' || inputId === 'd-chance') updDiceWin();
        }

        // --- ЛОГИКА DICE ---
        function updDiceWin() {
            let b = parseFloat(document.getElementById('d-bet').value) || 0;
            let c = parseFloat(document.getElementById('d-chance').value) || 1;
            if(c > 95) { c = 95; document.getElementById('d-chance').value = 95; }
            document.getElementById('d-possible').innerText = (b * (100/c)).toFixed(2);
        }

        async function playDice(mode) {
            let bet = parseFloat(document.getElementById('d-bet').value);
            let chance = parseFloat(document.getElementById('d-chance').value);
            if (bet > balance || bet <= 0) return alert("Недостаточно средств!");

            const res = await fetch(`${SERVER_URL}/play_dice`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, bet: bet, chance: chance, mode: mode })
            }).then(r => r.json());

            if(res.error) return alert(res.error);

            balance = res.new_balance; updateBal();
            let p = document.getElementById('d-res-plate');
            p.style.display = 'block';
            p.style.background = res.win ? "rgba(46, 204, 113, 0.2)" : "rgba(231, 76, 60, 0.2)";
            p.style.border = res.win ? "1px solid #2ecc71" : "1px solid #e74c3c";
            p.innerHTML = `<div style="font-size:10px">ВЫПАЛО</div><div style="font-size:24px">${res.roll}</div><div>${res.win ? ' ВЫИГРЫШ!' : 'ПРОИГРЫШ'}</div>`;
        }

        // --- ЛОГИКА МИНЫ ---
        let mState = { active: false, opened: 0 };
        function initMinesGrid() {
            const grid = document.getElementById('m-grid'); grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div'); cell.className = 'mine-cell';
                cell.id = 'cell-'+i;
                cell.onclick = () => clickMines(i); grid.appendChild(cell);
            }
        }

        async function startMines() {
            let b = parseFloat(document.getElementById('m-bet').value);
            let n = parseInt(document.getElementById('m-bombs').value);
            if(n < 1 || n > 24) return alert("Бомб должно быть от 1 до 24");

            const res = await fetch(`${SERVER_URL}/mines_start`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, bet: b, bombs: n })
            }).then(r => r.json());

            if(res.error) return alert(res.error);
            balance = res.balance; updateBal();
            mState = { active: true, opened: 0 };
            document.getElementById('m-start-btn').style.display = 'none';
            document.getElementById('m-cash-btn').style.display = 'none'; // Скрыто, пока не нажмет 1 клетку
            document.getElementById('m-coeff').innerText = 'x0.00';
            initMinesGrid();
        }

        let isClicking = false; // Блокировка от двойных быстрых кликов

async function clickMines(i) {
    if(!mState.active || isClicking) return;
    let cell = document.getElementById('cell-'+i);
    if(cell.classList.contains('open-gem') || cell.classList.contains('open-bomb')) return;

    cell.style.opacity = "0.5";
    isClicking = true;

    try {
        const response = await fetch(`${SERVER_URL}/mines_click`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user_id: userId, cell_idx: i })
        });
        const res = await response.json();
        cell.style.opacity = "1";

        if(res.result === 'bomb') {
            cell.classList.add('open-bomb'); cell.innerHTML = '💣';
            mState.active = false;
            revealAllBombs(res.grid);
            // ПРЯЧЕМ КНОПКУ ЗАБРАТЬ ПРИ БОМБЕ
            document.getElementById('m-cash-btn').style.display = 'none';
            document.getElementById('m-start-btn').style.display = 'block';
            setTimeout(() => { alert('БОМБА!'); }, 100);
        } else {
            cell.classList.add('open-gem'); cell.innerHTML = '💎';
            mState.opened++;
            document.getElementById('m-coeff').innerText = 'x' + res.coeff;
            document.getElementById('m-next').innerText = 'x' + res.next_coeff;
            document.getElementById('m-cash-btn').style.display = 'block';
        }
    } catch (e) { console.error(e); } finally { isClicking = false; }
}

async function cashoutMines() {
    const res = await fetch(`${SERVER_URL}/mines_cashout`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user_id: userId })
    }).then(r => r.json());
    
    if(res.win) {
        balance = res.balance; updateBal();
        revealAllBombs(res.grid);
        alert('Выигрыш: ' + res.win + ' ₽');
    }
    resetMines(); // Эта функция вернет кнопку ИГРАТЬ
}
        function resetMines() {
            mState.active = false;
            document.getElementById('m-start-btn').style.display = 'block';
            document.getElementById('m-cash-btn').style.display = 'none';
        }

        // --- ЛОГИКА КЕЙСЫ ---
        let curCaseId = null, isSpinning = false;

        function renderCases() {
            const grid = document.getElementById('cases-grid'); grid.innerHTML = '';
            for(let id in caseDB) {
                let c = caseDB[id];
                grid.innerHTML += `<div class="game-card" onclick="viewCase('${id}')">📦 ${c.n}<br><span style="color:#2ecc71">${c.p} ₽</span></div>`;
            }
        }

        function viewCase(id) {
            curCaseId = id;
            let c = caseDB[id];
            document.getElementById('cases-grid').style.display='none';
            document.getElementById('case-view').style.display='flex';
            document.getElementById('case-title').innerText = c.n;
            
            // Превью предметов
            let prev = document.getElementById('case-items-preview'); prev.innerHTML = '';
            c.items.forEach(it => {
                prev.innerHTML += `<div style="background:#2b2b2b; padding:5px 10px; border-radius:5px; font-size:12px; border:1px solid #444">${it}₽</div>`;
            });
            resetTape();
        }

        function resetTape() {
            let t = document.getElementById('tape'); t.style.transition = 'none'; t.style.transform = 'translateX(0px)'; t.innerHTML = '';
            let items = caseDB[curCaseId].items;
            for(let i=0; i<80; i++) {
                let val = items[Math.floor(Math.random()*items.length)];
                t.innerHTML += `<div class="r-item"><span style="font-size:10px; color:#777">PRIZE</span><b>${val}</b> ₽</div>`;
            }
        }

        async function startCase(isFast) {
    if(isSpinning || balance < caseDB[curCaseId].p) return alert("Мало денег или уже крутится!");
    
    isSpinning = true;
    try {
        const response = await fetch(`${SERVER_URL}/open_case`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user_id: userId, case_id: curCaseId })
        });
        const res = await response.json();

        if(res.error) { 
            isSpinning = false; // Важно: разблокируем кнопку при ошибке
            return alert(res.error); 
        }

        let t = document.getElementById('tape');
        let winAmount = res.win;
        let winIdx = 60; 
        
        t.children[winIdx].innerHTML = `<span style="font-size:10px; color:#f39c12">WINNER</span><b>${winAmount}</b> ₽`;
        
        let time = isFast ? 1500 : 5000; // Быстрое открытие еще быстрее (1.5 сек)
        let move = (winIdx * 80) - (document.querySelector('.roulette-container').offsetWidth / 2) + 40;
        
        t.style.transition = `transform ${time}ms cubic-bezier(0.1, 0, 0.1, 1)`;
        t.style.transform = `translateX(-${move}px)`;

        setTimeout(() => {
            balance = res.balance; updateBal();
            alert(`Выпало: ${winAmount} ₽`);
            isSpinning = false;
            resetTape();
        }, time + 500);
    } catch (err) {
        isSpinning = false;
        alert("Ошибка сервера при открытии кейса!");
    }
}

        function backToCases() { if(!isSpinning) { document.getElementById('cases-grid').style.display='grid'; document.getElementById('case-view').style.display='none'; } }

        // Загрузка данных
        async function loadUserData() {
            const params = new URLSearchParams(window.location.search);
            userId = parseInt(params.get('id') || tg.initDataUnsafe?.user?.id || 0);
            if(!userId) return;
            document.getElementById('myid').innerText = "ID: " + userId;

            const res = await fetch(`${SERVER_URL}/get_user?user_id=${userId}`).then(r => r.json());
            if(res.balance !== undefined) { balance = res.balance; updateBal(); }
        }

        window.onload = () => { tg.expand(); loadUserData(); };
    </script>
</body>
</html>
