<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: sans-serif; user-select: none; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e1e1e; border-bottom: 2px solid #f39c12; position: sticky; top: 0; z-index: 10; }
        .balance-container { display: flex; align-items: center; background: #2b2b2b; padding: 6px 12px; border-radius: 12px; border: 1px solid #333; cursor: pointer; }
        .balance-amount { color: #2ecc71; font-weight: bold; margin-right: 5px; }
        .casino-name { font-size: 18px; font-weight: bold; color: #f39c12; position: absolute; left: 50%; transform: translateX(-50%); }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #f39c12; }

        .lobby, .game-screen { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .game-card { background: #1e1e1e; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #333; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* МИНЫ СТИЛИ */
        #mines-game { display: none; }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .cell { aspect-ratio: 1/1; background: #2b2b2b; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #444; }
        .cell.open { background: #3d3d3d; border: none; }
        .cell.win { background: rgba(46, 204, 113, 0.2); border: 2px solid #2ecc71; }
        .cell.lose { background: rgba(231, 76, 60, 0.2); border: 2px solid #e74c3c; }
        
        .controls { background: #1e1e1e; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; }
        input, select { background: #2b2b2b; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; font-size: 16px; }
        .btn-play { background: #f39c12; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; }
        .btn-cashout { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; display: none; }

        /* Меню три полоски */
        .menu-trigger { position: fixed; bottom: 25px; left: 20px; background: #f39c12; width: 55px; height: 55px; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; z-index: 100; }
        .menu-trigger span { width: 30px; height: 3px; background: white; border-radius: 2px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #1e1e1e; z-index: 200; transition: 0.3s; padding-top: 20px; border-right: 1px solid #f39c12; }
        .side-menu.open { left: 0; }
        .menu-link { padding: 15px 25px; display: block; color: white; text-decoration: none; border-bottom: 1px solid #2b2b2b; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container" onclick="alert('Пополнение через бота')">
            <span class="balance-amount" id="balance">100.00</span> ₽
        </div>
        <div class="casino-name">FortuneFox</div>
        <img id="user-pic" class="user-avatar" src="https://ui-avatars.com/api/?name=U">
    </div>

    <!-- ЛОББИ -->
    <div id="lobby" class="lobby">
        <div class="game-card" onclick="alert('Скоро!')">🎰 СЛОТЫ</div>
        <div class="game-card" style="border: 1px solid #f39c12;" onclick="showMines()">💣 МИНЫ</div>
        <div class="game-card" onclick="alert('Скоро!')">🎲 DICE</div>
        <div class="game-card" onclick="alert('Скоро!')">📦 КЕЙСЫ</div>
    </div>

    <!-- ИГРА МИНЫ -->
    <div id="mines-game" class="game-screen">
        <button onclick="hideGames()" style="background:none; color:#f39c12; border:none; text-align:left; padding:0;">⬅ Назад</button>
        <div class="controls">
            <label>Ставка (₽):</label>
            <input type="number" id="bet-amount" value="10" min="1">
            <label>Кол-во бомб:</label>
            <select id="bomb-count">
                <option value="2">2 бомбы</option>
                <option value="3" selected>3 бомбы</option>
                <option value="5">5 бомб</option>
                <option value="10">10 бомб</option>
                <option value="24">24 бомбы</option>
            </select>
            <button class="btn-play" id="start-btn" onclick="startMines()">ИГРАТЬ</button>
            <button class="btn-cashout" id="cashout-btn" onclick="cashout()">ЗАБРАТЬ</button>
        </div>
        <div id="multiplier-display" style="text-align:center; font-weight:bold; color:#f39c12;"></div>
        <div class="mines-grid" id="grid"></div>
    </div>

    <!-- Кнопка три полоски -->
    <div class="menu-trigger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>

    <div class="side-menu" id="menu">
        <div style="text-align:center; padding: 20px; color: #f39c12; font-weight: bold;">FortuneFox</div>
        <a href="#" class="menu-link" onclick="hideGames(); toggleMenu()">🎮 Игры</a>
        <a href="#" class="menu-link" onclick="alert('Будет в Бонусах')">🎁 Бонусы</a>
        <a href="https://t.me/твой_саппорт" class="menu-link">🎧 Поддержка</a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 100.00; // Временный баланс, пока не подключим БД
        let currentBet = 0;
        let bombPositions = [];
        let gameActive = false;
        let revealedCells = 0;

        function updateBalanceDisplay() {
            document.getElementById('balance').innerText = balance.toFixed(2);
        }

        function toggleMenu() {
            document.getElementById('menu').classList.toggle('open');
        }

        function showMines() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('mines-game').style.display = 'flex';
            createGrid();
        }

        function hideGames() {
            document.getElementById('lobby').style.display = 'flex';
            document.getElementById('mines-game').style.display = 'none';
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.id = i;
                cell.onclick = () => clickCell(i);
                grid.appendChild(cell);
            }
        }

        function startMines() {
            let bet = parseFloat(document.getElementById('bet-amount').value);
            if (bet > balance || bet <= 0) return alert("Недостаточно баланса!");

            balance -= bet;
            currentBet = bet;
            updateBalanceDisplay();

            gameActive = true;
            revealedCells = 0;
            bombPositions = [];
            let count = parseInt(document.getElementById('bomb-count').value);while(bombPositions.length < count) {
                let r = Math.floor(Math.random() * 25);
                if(bombPositions.indexOf(r) === -1) bombPositions.push(r);
            }

            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('cashout-btn').style.display = 'block';
            document.getElementById('multiplier-display').innerText = "Множитель: x1.00";
            createGrid();
        }

        function clickCell(id) {
            if (!gameActive) return;
            const cells = document.getElementsByClassName('cell');
            const cell = cells[id];

            if (cell.classList.contains('open')) return;

            if (bombPositions.includes(id)) {
                gameOver(false);
            } else {
                cell.classList.add('open', 'win');
                cell.innerText = '💎';
                revealedCells++;
                let bombs = bombPositions.length;
                let mult = calculateMultiplier(25, bombs, revealedCells);
                document.getElementById('multiplier-display').innerText = `Множитель: x${mult.toFixed(2)}`;
                document.getElementById('cashout-btn').innerText = `ЗАБРАТЬ ${(currentBet * mult).toFixed(2)}₽`;
                
                if (revealedCells === (25 - bombs)) cashout();
            }
        }

        function calculateMultiplier(total, bombs, opened) {
            // Формула для расчета честного коэффициента
            function combinations(n, k) {
                if (k < 0 || k > n) return 0;
                if (k === 0 || k === n) return 1;
                if (k > n / 2) k = n - k;
                let res = 1;
                for (let i = 1; i <= k; i++) res = res * (n - i + 1) / i;
                return res;
            }
            let prob = combinations(total - opened, bombs) / combinations(total, bombs);
            return (0.95 / prob); // 0.95 - это маржа казино (5%)
        }

        function cashout() {
            if (!gameActive) return;
            let bombs = bombPositions.length;
            let mult = calculateMultiplier(25, bombs, revealedCells);
            let winAmount = currentBet * mult;
            balance += winAmount;
            updateBalanceDisplay();
            alert(`Вы выиграли ${winAmount.toFixed(2)}₽!`);
            gameOver(true);
        }

        function gameOver(isWin) {
            gameActive = false;
            const cells = document.getElementsByClassName('cell');
            bombPositions.forEach(pos => {
                cells[pos].innerText = '💣';
                cells[pos].classList.add('lose');
            });
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('cashout-btn').style.display = 'none';
        }
    </script>
</body>
</html>
