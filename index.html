<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #1e1e1e;
            border-bottom: 2px solid #f39c12;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .balance-container {
            display: flex;
            align-items: center;
            background: #2b2b2b;
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .balance-amount {
            color: #2ecc71;
            font-weight: bold;
            margin-right: 5px;
        }

        .plus-btn {
            background: #2ecc71;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .casino-name {
            font-size: 18px;
            font-weight: 800;
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #f39c12;
        }

        /* Меню игры */
        .lobby {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }

        .game-card {
            background: linear-gradient(135deg, #1e1e1e 0%, #252525 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.2s;
        }

        .game-card:active {
            transform: scale(0.95);
        }

        /* Кнопка Меню (Три полоски) */
        .menu-trigger {
            position: fixed;
            bottom: 25px;
            left: 20px;
            background: #f39c12;
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
            z-index: 100;
        }

        .menu-trigger span {
            width: 30px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        /* Боковое меню */
        .side-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 150;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;height: 100%;
            background: #1e1e1e;
            z-index: 200;
            transition: 0.3s;
            padding-top: 20px;
        }

        .side-menu.open {
            left: 0;
        }

        .menu-link {
            padding: 15px 25px;
            display: block;
            color: white;
            text-decoration: none;
            font-size: 18px;
            border-bottom: 1px solid #2b2b2b;
        }

        /* Модалка профиля */
        .modal-auth {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #252525;
            padding: 20px;
            border-radius: 15px;
            z-index: 300;
            text-align: center;
            border: 1px solid #f39c12;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container" onclick="alert('Пополнение в разработке')">
            <span class="balance-amount" id="user-bal">0.00</span>
            <span style="color:white; margin-right:5px">₽</span>
            <div class="plus-btn">+</div>
        </div>
        <div class="casino-name">FortuneFox</div>
        <div class="profile-section" onclick="toggleAuth()">
            <img id="user-pic" class="user-avatar" src="https://ui-avatars.com/api/?name=U">
        </div>
    </div>

    <div class="lobby">
        <div class="game-card" onclick="alert('Скоро добавим Слоты!')">🎰 СЛОТЫ</div>
        <div class="game-card" onclick="alert('Механика Мин будет в следующем обновлении!')">💣 МИНЫ</div>
        <div class="game-card" onclick="alert('Механика DICE будет в следующем обновлении!')">🎲 DICE</div>
        <div class="game-card" onclick="alert('Механика Кейсов будет в следующем обновлении!')">📦 КЕЙСЫ</div>
    </div>

    <!-- Кнопка три полоски -->
    <div class="menu-trigger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>

    <!-- Наложение для закрытия меню -->
    <div class="side-overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- Само меню -->
    <div class="side-menu" id="menu">
        <div style="text-align:center; padding: 20px; color: #f39c12; font-weight: bold; border-bottom: 1px solid #333;">МЕНЮ</div>
        <a href="#" class="menu-link" onclick="toggleMenu()">🎮 Игры</a>
        <a href="#" class="menu-link" onclick="alert('Задания появятся тут')">🎁 Бонусы</a>
        <a href="#" class="menu-link" onclick="alert('Рефералка скоро')">👥 Рефералы</a>
        <a href="https://t.me/твой_логин" class="menu-link" style="color: #3498db;">🎧 Поддержка</a>
    </div>

    <!-- Окно Выхода -->
    <div class="modal-auth" id="auth-modal">
        <p>Вы вошли как <br><b id="user-name">Игрок</b></p>
        <button onclick="tg.close()" style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:10px;">Выйти из приложения</button>
        <br><br>
        <button onclick="toggleAuth()" style="background:none; color:#aaa; border:none;">Закрыть</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Данные из Телеграм
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            if (user.photo_url) {
                document.getElementById('user-pic').src = user.photo_url;
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('menu');
            const overlay = document.getElementById('overlay');
            if (menu.classList.contains('open')) {
                menu.classList.remove('open');
                overlay.style.display = 'none';
            } else {
                menu.classList.add('open');
                overlay.style.display = 'block';
            }
        }

        function toggleAuth() {
            const modal = document.getElementById('auth-modal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
