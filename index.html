                return;
            }
            document.getElementById('d-win-text').innerText = (b * (95/c)).toFixed(2);
        }

        function playDice(mode) {
            let b = parseFloat(document.getElementById('d-bet').value);
            let c = parseFloat(document.getElementById('d-chance').value);
            if(b > balance || b <= 0) { tg.showAlert("Недостаточно средств или неверная ставка!"); return; }
            if(c < 1 || c > 95) { tg.showAlert("Шанс должен быть от 1% до 95%!"); return; }

            // Блокируем кнопки во время игры
            document.querySelectorAll('#dice-game .btn').forEach(btn => btn.disabled = true);
            document.querySelectorAll('#dice-game input').forEach(input => input.disabled = true);


            // Отправляем ставку на сервер
            sendToBot('update_balance', { amount: b, type: 'subtract', game_name: 'Dice' });
            
            // Генерируем результат локально (но выигрыш/проигрыш обрабатывается ботом)
            let roll = (Math.random() * 999999 + 1).toFixed(0);
            let win = mode === 'less' ? (roll/10000 <= c) : (roll/10000 >= (100-c));
            
            let res = document.getElementById('d-result');
            res.style.display = 'block'; 
            res.style.background = win ? 'var(--green)' : 'var(--red)';
            res.innerText = (win ? "ВЫИГРЫШ: " : "ПРОИГРЫШ: ") + roll;

            if (win) {
                let winAmount = (b * (95/c));
                sendToBot('update_balance', { amount: winAmount, type: 'add', game_name: 'Dice' });
            }

            // Разблокируем кнопки после небольшой задержки для UI эффекта (обновление баланса придет от бота)
            // Эти кнопки разблокируются в tg.onEvent('message') после получения BALANCE_UPDATE/BALANCE_ERROR
            // setTimeout(() => {
            //     document.querySelectorAll('#dice-game .btn').forEach(btn => btn.disabled = false);
            //     document.querySelectorAll('#dice-game input').forEach(input => input.disabled = false);
            // }, 1000); // 1 секунда
        }

        // КЕЙСЫ ЛОГИКА
        const cases = {
            'c1': { name: 'НОВИЧОК', price: 10, items: [2, 5, 10, 15, 20, 50] },
            'c2': { name: 'ОБЫЧНЫЙ', price: 50, items: [10, 25, 50, 75, 100, 250] },
            'c3': { name: 'СТАЛКЕР', price: 100, items: [20, 50, 100, 150, 200, 500] },
            'c4': { name: 'ЗОЛОТОЙ', price: 500, items: [100, 250, 500, 750, 1000, 2500] },
            'c5': { name: 'ЭЛИТНЫЙ', price: 1000, items: [200, 500, 1000, 1500, 2000, 5000] },
            'fox': { name: 'FOX CASE', price:
[17.03.2026 22:27] Сэм – ChatGPT нейросеть 🧠: 5000, items: [1000, 2500, 5000, 10000, 25000] }
        };
        let activeCase = null;
        let isSpinning = false;
        let caseWinValue = 0; // Для хранения значения выигрыша

        function openCaseMenu(id) {
            activeCase = cases[id];
            document.getElementById('case-title').innerText = activeCase.name;
            document.getElementById('case-selection').style.display = 'none';
            document.getElementById('cases-exit').style.display = 'none';
            document.getElementById('case-opening').style.display = 'block';
            document.getElementById('spin-btn').style.display = 'block'; // Показываем кнопку "Открыть"
            document.getElementById('case-result-display').style.display = 'none'; // Скрываем результат
            document.getElementById('spin-btn').disabled = false; // Разблокируем кнопку, если она была заблокирована из-за ошибки
            document.getElementById('case-back').style.opacity = '1'; // Разблокируем кнопку назад
            fillTape();
        }

        function closeCaseMenu() {
            if(isSpinning) return;
            document.getElementById('case-selection').style.display = 'grid';
            document.getElementById('cases-exit').style.display = 'block';
            document.getElementById('case-opening').style.display = 'none';
        }

        function fillTape() {
            const tape = document.getElementById('tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';
            tape.innerHTML = '';
            for(let i=0; i<60; i++) {
                let val = activeCase.items[Math.floor(Math.random()*activeCase.items.length)];
                tape.innerHTML += `<div class="case-item">${val}₽</div>`;
            }
        }

        function startCaseSpin() {
            if(balance < activeCase.price || isSpinning) { tg.showAlert("Недостаточно средств или уже крутится!"); return; }
            
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('case-back').style.opacity = '0.5';
            document.getElementById('case-result-display').style.display = 'none'; // Скрываем предыдущий результат

            // Сначала списываем ставку
            sendToBot('update_balance', { amount: activeCase.price, type: 'subtract', game_name: 'Cases' });

            const tape = document.getElementById('tape');
            caseWinValue = activeCase.items[Math.floor(Math.random()*activeCase.items.length)]; // Определяем выигрыш
            const winIdx = 50; 
            
            // Вставляем выигрышное значение в нужную позицию на ленте
            // Создаем временный массив для генерации элементов ленты с гарантированным выигрышем
            let tapeItems = [];
            for (let i = 0; i < 60; i++) {
                if (i === winIdx) {
                    tapeItems.push(caseWinValue); // Вставляем выигрыш
                } else {
                    tapeItems.push(activeCase.items[Math.floor(Math.random() * activeCase.items.length)]);
                }
            }
            // Обновляем HTML ленты
            tape.innerHTML = tapeItems.map(val => `<div class="case-item">${val}₽</div>`).join('');
            tape.children[winIdx].innerHTML = `<span style="color:var(--orange)">${caseWinValue}₽</span>`; // Подсвечиваем выигрыш

            let step = 80; 
            let offset = (winIdx * step) - (document.getElementById('tape').parentElement.offsetWidth / 2) + (step/2);
            tape.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
            tape.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                sendToBot('update_balance', { amount: caseWinValue, type: 'add', game_name: 'Cases' });
                document.getElementById('case-result-display').innerText = `Вы выиграли: ${caseWinValue} ₽!`;
                document.getElementById('case-result-display').style.display = 'block';
                document.getElementById('spin-btn').style.display = 'none'; // Скрываем кнопку "Открыть" после выигрыша
                isSpinning = false;
                // document.getElementById('spin-btn').disabled = false; // Не разблокируем, т.к. кнопка скрыта
                document.getElementById('case-back').style.opacity = '1';
                // fillTape(); // Больше не крутится, не обновляем ленту
            }, 6500);
        }

        // МИНЫ
        let mData = {active: false, b: 0, n: 0, op: 0, grid: [], revealed: Array(25).fill(false)}; // Добавил revealed
        function resetMinesUI() {
            const g = document.getElementById('m-grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => clickMine(i); g.appendChild(c);
            }
        }
        function startMines() {
            let b = parseFloat(document.getElementById('m-bet').value);
            let n = parseInt(document.getElementById('m-bombs').value);
            if(b > balance || b <= 0) { tg.showAlert("Недостаточно средств или неверная ставка!"); return; }
            if(n < 1 || n > 24) { tg.showAlert("Количество бомб должно быть от 1 до 24!"); return; }

            // Блокируем поля ввода и кнопку "Играть"
            document.getElementById('m-bet').disabled = true;
            document.getElementById('m-bombs').disabled = true;
            document.getElementById('m-start').disabled = true;
            document.getElementById('m-back').style.display = 'none'; // Скрываем кнопку назад

            // Отправляем ставку боту
            sendToBot('update_balance', { amount: b, type: 'subtract', game_name: 'Mines' });

            mData = {active: true, b: b, n: n, op: 0, grid: Array(25).fill('g'), revealed: Array(25).fill(false)}; // Обновляем
            let cnt = 0; while(cnt < n) {
                let r = Math.floor(Math.random()*25);
                if(mData.grid[r] === 'g') { mData.grid[r] = 'b'; cnt++; }
            }
            document.getElementById('m-start').style.display = 'none';
            document.getElementById('m-cash').style.display = 'none';
            document.getElementById('m-coeff').innerText = 'x0.00';
            resetMinesUI();
        }
        function clickMine(i) {
            if(!mData.active || mData.revealed[i]) return; // Запрещаем повторные клики по открытым ячейкам
            
            let cells = document.getElementById('m-grid').children;
            mData.revealed[i] = true; // Отмечаем ячейку как открытую
            cells[i].classList.add('disabled'); // Отключаем клики по этой ячейке

            if(mData.grid[i] === 'b') {
                cells[i].classList.add('bomb'); cells[i].innerText = '💣';
                mData.active = false; 
                tg.showAlert("БОМБА!");
                // Открываем все оставшиеся бомбы для наглядности
                for (let j = 0; j < 25; j++) {
                    if (mData.grid[j] === 'b' && !mData.revealed[j]) {
                        cells[j].classList.add('bomb'); cells[j].innerText = '💣';
                    }
                }
                document.getElementById('m-start').style.display = 'block'; // Показываем кнопку "Играть" снова
                document.getElementById('m-start').disabled = false; // Разблокируем ее
                document.getElementById('m-cash').style.display = 'none';
                document.getElementById('m-bet').disabled = false; // Разблокируем поля ставок
                document.getElementById('m-bombs').disabled = false;
                document.getElementById('m-back').style.display = 'block'; // Показываем кнопку назад
            } else {
                cells[i].classList.add('gem'); cells[i].innerText = '💎';
                mData.op++;
                document.getElementById('m-cash').style.display = 'block';
                let mult = 0.98;
                for(let j=0; j<mData.op; j++) mult *= (25-j)/(25-mData.n-j);
                document.getElementById('m-coeff').innerText = 'x' + mult.toFixed(2);
            }}
        function cashMines() {
            if (!mData.active) { // Нельзя забрать, если игра неактивна (уже проиграли или не начали)
                tg.showAlert("Игра не активна!");
                return;
            }
            if (mData.op === 0) { // Нельзя забрать, если не открыто ни одной ячейки
                tg.showAlert("Откройте хотя бы одну ячейку, чтобы забрать выигрыш!");
                return;
            }

            let mult = parseFloat(document.getElementById('m-coeff').innerText.replace('x',''));
            let winAmount = mData.b * mult;

            sendToBot('update_balance', { amount: winAmount, type: 'add', game_name: 'Mines' });
            
            mData.active = false;
            document.getElementById('m-start').style.display = 'block';
            document.getElementById('m-start').disabled = false;
            document.getElementById('m-cash').style.display = 'none';
            document.getElementById('m-bet').disabled = false;
            document.getElementById('m-bombs').disabled = false;
            document.getElementById('m-back').style.display = 'block';
            tg.showAlert("Вы успешно забрали: " + winAmount.toFixed(2) + " ₽!");
        }

        function getDaily() {
            // Отправляем запрос на получение бонуса боту
            sendToBot('get_daily_bonus'); // Это действие нужно будет реализовать в main.py
            tg.showAlert("Запрос на получение бонуса отправлен!");
            // Пока просто обновляем баланс на UI, пока не будет ответа от бота
            // let win = (Math.random() * 24 + 1).toFixed(2);
            // balance += parseFloat(win); updateBal();
            // tg.showAlert("Бонус: " + win + " ₽");
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('r-link').innerText);
            tg.showAlert("Скопировано!");
        }

        // Вызываем initApp при загрузке страницы
        tg.ready(function() { // Теперь initApp вызывается после готовности WebApp
            initApp(); 
            tg.expand();
        });
        
    </script>
