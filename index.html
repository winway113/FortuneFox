<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* ШАПКА */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #1e1e1e; border-bottom: 1px solid #f39c12; height: 60px; }
        .balance-container { display: flex; align-items: center; gap: 8px; background: #2b2b2b; padding: 5px 10px; border-radius: 10px; border: 1px solid #333; }
        .balance-amount { color: #2ecc71; font-weight: bold; font-size: 16px; }
        .plus-btn { background: #2ecc71; color: white; border:none; border-radius: 5px; width: 22px; height: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* МОДАЛЬНОЕ ОКНО (КОШЕЛЕК) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1e1e1e; width: 85%; padding: 25px; border-radius: 20px; border: 1px solid #f39c12; text-align: center; }

        .main-container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .screen { display: none; flex-direction: column; gap: 15px; width: 100%; }
        .active-screen { display: flex; }

        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .game-card { background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #f39c12; font-weight: bold; cursor: pointer; min-height: 80px; display: flex; align-items: center; justify-content: center; }

        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-deposit { background: #2ecc71; color: white; }
        .btn-withdraw { background: #e74c3c; color: white; }
        .btn-main { background: #f39c12; color: #000; }

        /* ОСТАЛЬНЫЕ СТИЛИ (Мины, Дайс и т.д.) */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 320px; margin: 0 auto; }
        .mine-cell { aspect-ratio: 1/1; background: #2b2b2b; border-radius: 8px; border: 2px solid #3d3d3d; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .mine-cell.open-gem { background: #2ecc71; }
        .mine-cell.open-bomb { background: #ff7675; }
        .promo-input { width: 100%; padding: 12px; background: #2b2b2b; border: 1px solid #444; border-radius: 8px; color: #fff; margin-bottom: 10px; outline: none; }
        
        .menu-btn { position: fixed; bottom: 20px; left: 20px; background: #f39c12; width: 50px; height: 50px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; z-index: 100; }
        .menu-btn span { width: 25px; height: 3px; background: #fff; border-radius: 2px; }
        .side-menu { position: fixed; top: 0; left: -100%; width: 75%; height: 100%; background: #1e1e1e; z-index: 1000; transition: 0.3s; border-right: 2px solid #f39c12; padding: 20px; }
        .side-menu.open { left: 0; }
        .menu-link { display: block; padding: 15px; color: #fff; text-decoration: none; font-weight: bold; border-bottom: 1px solid #333; }

        .roulette-container { width: 100%; height: 100px; background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #f39c12; position: relative; margin: 10px 0; }
        .roulette-tape { display: flex; position: absolute; height: 100%; left: 0; transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1); }
        .r-item { min-width: 80px; width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid #333; background: #252525; font-weight: bold; font-size: 14px; }
        .roulette-pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 100%; background: #f39c12; z-index: 10; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container">
            <span class="balance-amount" id="balance">0.00</span><span style="color:#2ecc71">₽</span>
            <button class="plus-btn" onclick="openWallet()">+</button>
        </div>
        <div style="color:#f39c12; font-weight:bold;">FORTUNEFOX</div>
        <img id="user-pic" style="width:32px; border-radius:50%;" src="https://ui-avatars.com/api/?name=U">
    </div>

    <!-- ОКНО КОШЕЛЬКА -->
    <div id="wallet-modal" class="modal">
        <div class="modal-content"><h2 style="color:#f39c12; margin-top:0;">КОШЕЛЕК</h2>
            <p style="font-size: 14px; color: #aaa;">Выберите действие</p>
            <button class="btn btn-deposit" onclick="deposit()">ПОПОЛНИТЬ</button>
            <button class="btn btn-withdraw" onclick="withdraw()">ВЫВЕСТИ</button>
            <button class="btn" style="background:none; color:#777;" onclick="closeWallet()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="main-container">
        <!-- ЛОББИ -->
        <div id="lobby" class="screen active-screen">
            <div class="game-card" style="min-height: 120px; font-size: 20px;" onclick="alert('Скоро...')">🎰 СЛОТЫ</div>
            <div class="grid-2col">
                <div class="game-card" onclick="showScreen('mines-game')">💣 МИНЫ</div>
                <div class="game-card" onclick="showScreen('dice-game')">🎲 DICE</div>
            </div>
            <div class="game-card" onclick="showScreen('cases-game')">📦 КЕЙСЫ</div>
        </div>

        <!-- МИНЫ -->
        <div id="mines-game" class="screen">
            <div id="m-coeff" style="text-align:center; font-size:24px; color:#f39c12; font-weight:bold;">x0.00</div>
            <div class="mines-grid" id="m-grid"></div>
            <div class="grid-2col">
                <div><label style="font-size:10px; color:#777;">СТАВКА</label><input type="number" id="m-bet" value="10" class="promo-input"></div>
                <div><label style="font-size:10px; color:#777;">БОМБЫ</label><input type="number" id="m-bombs" value="3" class="promo-input"></div>
            </div>
            <button class="btn btn-main" id="m-start-btn" onclick="startMines()">ИГРАТЬ</button>
            <button class="btn btn-deposit" id="m-cash-btn" style="display:none;" onclick="cashoutMines()">ЗАБРАТЬ</button>
            <button class="btn" style="background:none; color:#777" onclick="exitToLobby()">НАЗАД</button>
        </div>

        <!-- DICE -->
        <div id="dice-game" class="screen">
            <div id="d-possible" style="font-size:45px; color:#f39c12; text-align:center; font-weight:bold;">20.00</div>
            <div class="grid-2col">
                <input type="number" id="d-bet" value="10" class="promo-input" oninput="updDiceWin()">
                <input type="number" id="d-chance" value="50" class="promo-input" oninput="updDiceWin()">
            </div>
            <div class="grid-2col">
                <button class="btn btn-main" onclick="playDice('less')">МЕНЬШЕ</button>
                <button class="btn btn-main" onclick="playDice('more')">БОЛЬШЕ</button>
            </div>
            <div id="d-res-plate" style="padding:15px; border-radius:10px; text-align:center; display:none; font-weight:bold;"></div>
            <button class="btn" style="background:none; color:#777" onclick="exitToLobby()">НАЗАД</button>
        </div>

        <!-- КЕЙСЫ -->
        <div id="cases-game" class="screen">
            <div id="cases-grid" class="grid-2col">
                <div class="game-card" onclick="viewCase('c1')">📦 10 ₽</div>
                <div class="game-card" onclick="viewCase('c2')">📦 50 ₽</div>
                <div class="game-card" onclick="viewCase('c3')">📦 150 ₽</div>
                <div class="game-card" onclick="viewCase('c4')">📦 250 ₽</div>
                <div class="game-card" onclick="viewCase('fox')" style="border-color:#f1c40f;">🦊 5000 ₽</div>
            </div>
            <div id="case-view" style="display:none; flex-direction:column; align-items:center;">
                <div class="roulette-container"><div class="roulette-pointer"></div><div class="roulette-tape" id="tape"></div></div>
                <button class="btn btn-main" id="open-btn" onclick="startCase()">ОТКРЫТЬ</button>
                <button class="btn" style="background:none; color:#777" onclick="backToCases()">НАЗАД</button>
            </div>
        </div>
    </div>

    <div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="side-menu" id="side-menu">
        <a href="#" class="menu-link" onclick="exitToLobby(); toggleMenu()">🎰 ИГРЫ</a>
        <a href="#" class="menu-link" onclick="alert('В разработке')">🎁 БОНУСЫ</a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let balance = 100.00;
        tg.expand();

        function updateBal() { document.getElementById('balance').innerText = balance.toFixed(2); }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        function openWallet() { document.getElementById('wallet-modal').style.display = 'flex'; }
        function closeWallet() { document.getElementById('wallet-modal').style.display = 'none'; }
        
        function deposit() {
            tg.close(); // Закрываем игру, чтобы человек мог написать боту или увидеть кнопки
            alert("Напишите боту для пополнения!");
        }

        function withdraw() {
            if(balance < 1000) {
                alert("Минимальный вывод: 1000 ₽. Ваш баланс: " + balance.toFixed(2) + " ₽");
            } else {
                alert("Заявка на вывод создана! Свяжитесь с админом.");
            }
        }

        function showScreen(id) {
            document.getElementById('lobby').style.display='none'; 
            document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
            document.getElementById(id).style.display='flex'; 
            if(id === 'mines-game') initMinesGrid();
        }

        function exitToLobby() { 
            document.getElementById('lobby').style.display='flex'; 
            document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
        }

        // --- DICE ---
        function updDiceWin() {
            let b = parseFloat(document.getElementById('d-bet').value) || 0;
            let c = parseFloat(document.getElementById('d-chance').value) || 1;
            document.getElementById('d-possible').innerText = (b * (95/c)).toFixed(2);
        }
        function playDice(t) {
            let b = parseFloat(document.getElementById('d-bet').value);
            let c = parseFloat(document.getElementById('d-chance').value);
            if(b > balance) return;
            balance -= b; updateBal();
            let r = Math.floor(Math.random() * 1000001);
            let target = c * 10000;
            let win = (t === 'less') ? (r < target) : (r >= (1000000 - target));
            let p = document.getElementById('d-res-plate');
            p.style.display = 'block';
            p.style.background = win ? "#2ecc71" : "#ff7675";
            if(win) { 
                let w = b * (95/c); balance += w; p.innerText = "ВЫИГРАЛИ: " + w.toFixed(2) + "₽"; 
            } else { p.innerText = "ПРОИГРАЛИ: " + r; }
            updateBal();
        }

        // --- МИНЫ ---
        let mState = { active: false, bet: 0, bombs: 0, opened: 0, grid: [] };
        function initMinesGrid() {
            const grid = document.getElementById('m-grid'); grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div'); cell.className = 'mine-cell';
                cell.onclick = () => clickMines(i); grid.appendChild(cell);
            }
        }
        function startMines() {
            let b = parseFloat(document.getElementById('m-bet').value);
            let n = parseInt(document.getElementById('m-bombs').value);
            if(b > balance || n < 2 || n > 24) return;
            balance -= b; updateBal();
            mState = { active: true, bet: b, bombs: n, opened: 0, grid: Array(25).fill('gem') };
            let cnt = 0; while(cnt < n) { let r = Math.floor(Math.random()*25); if(mState.grid[r]==='gem'){mState.grid[r]='bomb'; cnt++;} }
            document.getElementById('m-start-btn').style.display = 'none';
            document.getElementById('m-cash-btn').style.display = 'block';
            initMinesGrid();
        }
        function clickMines(i) {
            if(!mState.active) return;
            let cell = document.getElementById('m-grid').children[i];
            if(cell.classList.contains('open-gem')) return;if(mState.grid[i] === 'bomb') {
                cell.classList.add('open-bomb'); cell.innerText = '💣';
                mState.active = false; setTimeout(() => { alert('БОМБА!'); resetMines(); }, 500);
            } else {
                cell.classList.add('open-gem'); cell.innerText = '💎';
                mState.opened++; document.getElementById('m-coeff').innerText = 'x' + getMult();
            }
        }
        function getMult() {
            let n=25, k=mState.bombs, o=mState.opened; if(o===0) return 0;
            let res = 0.97; for(let i=0; i<o; i++) res *= (n-i)/(n-k-i);
            return res.toFixed(2);
        }
        function cashoutMines() {
            let win = mState.bet * getMult(); balance += win; updateBal();
            alert('Выиграно: ' + win.toFixed(2) + ' ₽'); resetMines();
        }
        function resetMines() {
            mState.active = false;
            document.getElementById('m-start-btn').style.display = 'block';
            document.getElementById('m-cash-btn').style.display = 'none';
        }

        // --- КЕЙСЫ ---
        const caseDB = {
            'c1': {p: 10, items: [2, 5, 10, 20], w: [40, 30, 25, 5]},
            'c2': {p: 50, items: [10, 25, 50, 150], w: [40, 35, 20, 5]},
            'fox': {p: 5000, items: [2500, 5000, 15000, 50000], w: [60, 25, 10, 5]}
        };
        let curCase = null, isSpinning = false;
        function viewCase(id) {
            curCase = caseDB[id];
            document.getElementById('cases-grid').style.display='none';
            document.getElementById('case-view').style.display='flex';
            resetTape();
        }
        function resetTape() {
            let t = document.getElementById('tape'); t.style.transition = 'none'; t.style.transform = 'translateX(0px)'; t.innerHTML = '';
            for(let i=0; i<85; i++) {
                let pr = curCase.items[Math.floor(Math.random()*curCase.items.length)];
                t.innerHTML += `<div class="r-item">${pr} ₽</div>`;
            }
        }
        function startCase() {
            if(balance < curCase.p || isSpinning) return;
            isSpinning = true; balance -= curCase.p; updateBal();
            let t = document.getElementById('tape');
            let win = curCase.items[Math.floor(Math.random()*curCase.items.length)];
            let winIdx = 70; 
            t.children[winIdx].innerHTML = `<b>${win}</b> ₽`;
            let itemW = 80;
            let centerPos = (winIdx * itemW) - (document.querySelector('.roulette-container').offsetWidth / 2) + (itemW / 2);
            t.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
            t.style.transform = `translateX(-${centerPos}px)`;
            setTimeout(() => { balance += win; updateBal(); alert('Приз: ' + win + '₽'); isSpinning = false; }, 7200);
        }
        function backToCases() { if(!isSpinning) { document.getElementById('cases-grid').style.display='grid'; document.getElementById('case-view').style.display='none'; } }

        updateBal();
    </script>
</body>
</html>
