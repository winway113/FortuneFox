<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; user-select: none; overflow: hidden; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #1e1e1e; border-bottom: 2px solid #f39c12; }
        .balance-container { display: flex; align-items: center; background: #2b2b2b; padding: 5px 12px; border-radius: 10px; border: 1px solid #333; }
        .balance-amount { color: #2ecc71; font-weight: bold; margin-right: 5px; font-size: 1.1em; }
        .casino-name { font-size: 18px; font-weight: 800; color: #f39c12; text-transform: uppercase; }
        .user-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #f39c12; }

        /* Лобби */
        .lobby { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .game-card { background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.98); border-color: #f39c12; }

        /* ИГРА МИНЫ */
        #mines-game { display: none; flex-direction: column; padding: 10px; align-items: center; }
        
        /* Сетка сверху */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 350px; margin-top: 10px; }
        .cell { aspect-ratio: 1/1; background: #2b2b2b; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid #444; transition: 0.2s; }
        .cell.open.win { background: rgba(46, 204, 113, 0.15); border: 2px solid #2ecc71; }
        .cell.lose { background: rgba(231, 76, 60, 0.2); border: 2px solid #e74c3c; }

        #multiplier-info { margin: 10px 0; font-size: 1.2em; color: #f39c12; font-weight: bold; height: 24px; }

        /* Управление снизу */
        .bottom-controls { background: #1e1e1e; width: 100%; padding: 15px; border-radius: 20px 20px 0 0; border-top: 2px solid #333; position: fixed; bottom: 0; left: 0; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; }
        
        .input-row { display: flex; gap: 10px; }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #aaa; padding-left: 5px; }
        input { background: #2b2b2b; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #f39c12; }

        .btn-play { background: #f39c12; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-cashout { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 18px; display: none; }
        .btn-exit { background: transparent; color: #e74c3c; border: 1px solid #e74c3c; padding: 8px; border-radius: 8px; margin-top: 5px; font-size: 14px; }

        /* Меню "Три полоски" */
        .menu-btn { position: fixed; bottom: 180px; left: 15px; background: #333; width: 45px; height: 45px; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; z-index: 50; border: 1px solid #444; }
        .menu-btn span { width: 22px; height: 2px; background: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container">
            <span class="balance-amount" id="balance">100.00</span> ₽
        </div>
        <div class="casino-name">FortuneFox</div>
        <img id="user-pic" class="user-avatar" src="https://ui-avatars.com/api/?name=U">
    </div>

    <!-- ЛОББИ -->
    <div id="lobby" class="lobby">
        <div class="game-card" onclick="alert('Скоро!')">🎰 СЛОТЫ</div>
        <div class="game-card" style="border: 1px solid #f39c12;" onclick="showMines()">💣 МИНЫ</div>
        <div class="game-card" onclick="alert('Скоро!')">🎲 DICE</div>
        <div class="game-card" onclick="alert('Скоро!')">📦 КЕЙСЫ</div>
    </div>

    <!-- ИГРА МИНЫ -->
    <div id="mines-game">
        <div id="multiplier-info">Множитель: x1.00</div>
        
        <div class="mines-grid" id="grid"></div>

        <div class="bottom-controls">
            <div class="input-row">
                <div class="input-group">
                    <label>Ставка (₽)</label>
                    <input type="number" id="bet-amount" value="10" min="1">
                </div>
                <div class="input-group">
                    <label>Бомбы (2-24)</label>
                    <input type="number" id="bomb-input" value="3" min="2" max="24">
                </div>
            </div>
            
            <button class="btn-play" id="start-btn" onclick="startMines()">ИГРАТЬ</button>
            <button class="btn-cashout" id="cashout-btn" onclick="cashout()">ЗАБРАТЬ</button>
            <button class="btn-exit" id="exit-btn" onclick="hideGames()">ВЫЙТИ В МЕНЮ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 100.00; 
        let currentBet = 0;
        let bombPositions = [];
        let gameActive = false;
        let revealedCells = 0;

        // Авторизация
        const user = tg.initDataUnsafe.user;
        if (user && user.photo_url) document.getElementById('user-pic').src = user.photo_url;

        function updateBalanceDisplay() {
            document.getElementById('balance').innerText = balance.toFixed(2);
        }

        function showMines() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('mines-game').style.display = 'flex';
            createGrid();
        }

        function hideGames() {
            if(gameActive) { if(!confirm("Игра идет! Уверены что хотите выйти?")) return; }
            document.getElementById('lobby').style.display = 'flex';
            document.getElementById('mines-game').style.display = 'none';
            gameActive = false;
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => clickCell(i);
                grid.appendChild(cell);
            }
        }

        function startMines() {
            let bet = parseFloat(document.getElementById('bet-amount').value);
            let bombCount = parseInt(document.getElementById('bomb-input').value);

            if (isNaN(bombCount) || bombCount < 2 || bombCount > 24) return alert("Бомб должно быть от 2 до 24!");
            if (bet > balance || bet <= 0) return alert("Недостаточно баланса!");

            balance -= bet;
            currentBet = bet;
            updateBalanceDisplay();

            gameActive = true;
            revealedCells = 0;
            bombPositions = [];
            
            while(bombPositions.length < bombCount) {
                let r = Math.floor(Math.random() * 25);
                if(bombPositions.indexOf(r) === -1) bombPositions.push(r);
            }document.getElementById('start-btn').style.display = 'none';
            document.getElementById('cashout-btn').style.display = 'block';
            document.getElementById('exit-btn').style.display = 'none';
            document.getElementById('multiplier-info').innerText = "Множитель: x1.00";
            createGrid();
        }

        function clickCell(id) {
            if (!gameActive) return;
            const cells = document.getElementsByClassName('cell');
            const cell = cells[id];
            if (cell.classList.contains('open')) return;

            if (bombPositions.includes(id)) {
                gameOver(false);
            } else {
                cell.classList.add('open', 'win');
                cell.innerText = '💎';
                revealedCells++;
                let bombs = bombPositions.length;
                let mult = calculateMultiplier(25, bombs, revealedCells);
                document.getElementById('multiplier-info').innerText = `Множитель: x${mult.toFixed(2)}`;
                document.getElementById('cashout-btn').innerText = `ЗАБРАТЬ ${(currentBet * mult).toFixed(2)}₽`;
                
                if (revealedCells === (25 - bombs)) cashout();
            }
        }

        function calculateMultiplier(total, bombs, opened) {
            function combinations(n, k) {
                if (k < 0 || k > n) return 0;
                if (k === 0 || k === n) return 1;
                let res = 1;
                for (let i = 1; i <= k; i++) res = res * (n - i + 1) / i;
                return res;
            }
            let prob = combinations(total - opened, bombs) / combinations(total, bombs);
            return (0.97 / prob); // 0.97 - маржа (3%)
        }

        function cashout() {
            if (!gameActive) return;
            let bombs = bombPositions.length;
            let mult = calculateMultiplier(25, bombs, revealedCells);
            let winAmount = currentBet * mult;
            balance += winAmount;
            updateBalanceDisplay();
            tg.HapticFeedback.notificationOccurred('success');
            gameOver(true);
        }

        function gameOver(isWin) {
            gameActive = false;
            const cells = document.getElementsByClassName('cell');
            bombPositions.forEach(pos => {
                cells[pos].innerText = '💣';
                cells[pos].classList.add('lose');
            });
            if(!isWin) tg.HapticFeedback.notificationOccurred('error');
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('cashout-btn').style.display = 'none';
            document.getElementById('exit-btn').style.display = 'block';
        }
    </script>
</body>
</html>
