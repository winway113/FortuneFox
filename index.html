<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ОСНОВНОЙ ТЕМНЫЙ ФОН */
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; user-select: none; overflow-x: hidden; }
        
        /* ШАПКА */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #1e1e1e; border-bottom: 2px solid #f39c12; position: sticky; top: 0; z-index: 100; }
        .balance-container { display: flex; align-items: center; background: #2b2b2b; padding: 5px 12px; border-radius: 10px; border: 1px solid #333; cursor: pointer; }
        .balance-amount { color: #2ecc71; font-weight: bold; margin-right: 5px; }
        .casino-name { font-size: 18px; font-weight: 800; color: #f39c12; text-transform: uppercase; letter-spacing: 1px; }
        .user-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #f39c12; }

        /* ЛОББИ (ГЛАВНОЕ МЕНЮ) */
        .lobby { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .game-card { background: #1e1e1e; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #333; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); border-color: #f39c12; }

        /* ИГРОВЫЕ ЭКРАНЫ */
        .game-screen { display: none; flex-direction: column; padding: 10px; align-items: center; padding-bottom: 220px; }

        /* ДИЗАЙН DICE (КАК НА ФОТО, НО В ТЕМНОМ СТИЛЕ) */
        .dice-container { width: 100%; max-width: 400px; background: #1e1e1e; padding: 20px; border-radius: 20px; margin-top: 10px; border: 1px solid #333; }
        .dice-row { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }
        .dice-box { flex: 1; }
        .dice-box label { display: block; text-align: center; color: #888; margin-bottom: 5px; font-size: 14px; }
        .input-wrap { background: #2b2b2b; border: 2px solid #333; border-radius: 12px; padding: 10px; }
        .input-wrap input { background: transparent; border: none; width: 100%; text-align: center; font-size: 22px; font-weight: bold; color: white; outline: none; }
        
        .dice-mult { font-size: 50px; font-weight: bold; margin: 15px 0; color: white; text-align: center; }
        .dice-subtext { color: #666; font-size: 14px; text-align: center; margin-bottom: 15px; }
        
        .range-info { display: flex; justify-content: space-between; width: 100%; color: #666; font-size: 12px; margin-bottom: 10px; padding: 0 10px; }
        .dice-btns { display: flex; gap: 10px; width: 100%; }
        .dice-btns button { flex: 1; padding: 15px; border: none; border-radius: 12px; background: #2b2b2b; color: white; font-weight: bold; font-size: 16px; border: 1px solid #333; }

        /* ДИЗАЙН МИНЫ (СЕТКА СВЕРХУ) */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 350px; margin-bottom: 15px; }
        .cell { aspect-ratio: 1/1; background: #2b2b2b; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid #444; }
        .cell.win { background: rgba(46, 204, 113, 0.1); border-color: #2ecc71; }
        .cell.lose { background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; }
        .next-step { color: #f39c12; font-weight: bold; margin-bottom: 10px; font-size: 14px; }

        /* КНОПКА ТРИ ПОЛОСКИ */
        .menu-btn { position: fixed; bottom: 25px; left: 20px; background: #f39c12; width: 55px; height: 55px; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .menu-btn span { width: 30px; height: 3px; background: white; border-radius: 2px; }

        /* БОКОВОЕ МЕНЮ */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #1e1e1e; z-index: 2000; transition: 0.3s; padding-top: 50px; border-right: 2px solid #f39c12; }
        .side-menu.open { left: 0; }
        .menu-item { padding: 15px 25px; display: block; color: white; text-decoration: none; border-bottom: 1px solid #333; font-size: 18px; }

        /* РЕЗУЛЬТАТ (ЗЕЛЕНЫЙ/КРАСНЫЙ ПРЯМОУГОЛЬНИК) */
        .res-overlay { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); padding: 15px 40px; border-radius: 12px; font-size: 28px; font-weight: bold; color: white; z-index: 3000; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container" onclick="alert('Управление через бота')">
            <span class="balance-amount" id="balance">100.00</span> ₽
        </div>
        <div class="casino-name">FortuneFox</div>
        <img id="user-pic" class="user-avatar" src="https://ui-avatars.com/api/?name=U">
    </div>

    <!-- ЛОББИ -->
    <div id="lobby" class="lobby">
        <div class="game-card" onclick="alert('Слоты в разработке')">🎰 СЛОТЫ</div>
        <div class="game-card" style="border-color: #f39c12;" onclick="showGame('mines')">💣 МИНЫ</div>
        <div class="game-card" style="border-color: #f39c12;" onclick="showGame('dice')">🎲 DICE</div>
        <div class="game-card" onclick="alert('Кейсы в разработке')">📦 КЕЙСЫ</div>
    </div>

    <!-- DICE GAME -->
    <div id="dice-game" class="game-screen">
        <div class="dice-container">
            <div class="dice-row">
                <div class="dice-box">
                    <label>Ставка</label>
                    <div class="input-wrap"><input type="number" id="dice-bet" value="1.00"></div>
                    <div class="btn-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-top:8px;">
                        <button onclick="editBet('min')" style="font-size:10px; padding:5px; background:#333; color:white; border:none; border-radius:5px;">Мин.</button>
                        <button onclick="editBet('x2')" style="font-size:10px; padding:5px; background:#333; color:white; border:none; border-radius:5px;">X2</button>
                        <button onclick="editBet('/2')" style="font-size:10px; padding:5px; background:#333; color:white; border:none; border-radius:5px;">1/2</button>
                        <button onclick="editBet('max')" style="font-size:10px; padding:5px; background:#333; color:white; border:none; border-radius:5px;">Макс.</button>
                    </div>
                </div>
                <div class="dice-box">
                    <label>Шанс</label>
                    <div class="input-wrap"><input type="number" id="dice-chance" value="80.00"></div>
                    <div class="btn-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-top:8px;">
                        <button onclick="editChance('min')" style="font-size:10px; padding:5px; background:#333; color:white; border:none; border-radius:5px;">Мин.</button>
                        <button onclick="editChance('x2')" style="font-size:10px; padding:5px; background:#333; color:white; border:none; border-radius:5px;">X2</button>
                        <button onclick="editChance('/2')" style="font-size:10px; padding:5px; background:#333; color:white; border:none; border-radius:5px;">1/2</button>
                        <button onclick="editChance('max')" style="font-size:10px; padding:5px; background:#333; color:white; border:none; border-radius:5px;">Макс.</button>
                    </div>
                </div>
            </div>

            <div class="dice-mult" id="d-mult">1.21</div>
            <div class="dice-subtext">Возможный выигрыш</div>

            <div class="range-info">
                <span id="r-less">0 - 799999</span>
                <span id="r-more">200000 - 999999</span>
            </div>
            <div class="dice-btns">
                <button onclick="playDice('less')">Меньше</button>
                <button onclick="playDice('more')">Больше</button>
            </div>
        </div>
        <button onclick="exitToLobby()" style="background:none; border:1px solid #444; color:#888; padding:10px; border-radius:10px; margin-top:20px; width:100%;">ВЫЙТИ</button>
    </div>

    <!-- MINES GAME -->
    <div id="mines-game" class="game-screen">
        <div style="font-size:32px; font-weight:bold; margin-bottom:5px;" id="m-mult">x1.00</div>
        <div id="m-next" class="next-step">Следующий шаг: x1.14</div>

        <div class="mines-grid" id="m-grid"></div>

        <div class="dice-container">
            <div class="dice-row">
                <div class="dice-box"><label>Ставка</label><div class="input-wrap"><input type="number" id="m-bet-val" value="10"></div></div>
                <div class="dice-box"><label>Бомбы</label><div class="input-wrap"><input type="number" id="m-bomb-val" value="3"></div></div>
            </div>
            <button id="m-btn-start" onclick="startMines()" style="width:100%; padding:15px; background:#f39c12; border:none; border-radius:12px; color:white; font-weight:bold; font-size:18px;">ИГРАТЬ</button>
            <button id="m-btn-cash" onclick="cashMines()" style="width:100%; padding:15px; background:#2ecc71; border:none; border-radius:12px; color:white; font-weight:bold; font-size:18px; display:none;">ЗАБРАТЬ</button>
        </div>
        <button onclick="exitToLobby()" id="m-exit" style="background:none; border:1px solid #444; color:#888; padding:10px; border-radius:10px; margin-top:15px; width:100%;">ВЫЙТИ</button>
    </div>

    <!-- МЕНЮ ТРИ ПОЛОСКИ -->
    <div class="menu-btn" onclick="toggleSideMenu()">
        <span></span><span></span><span></span>
    </div>

    <div class="side-menu" id="side-menu">
        <div style="padding:20px; text-align:center; color:#f39c12; font-weight:bold; font-size:20px; border-bottom:1px solid #333;">FortuneFox</div>
        <a href="#" class="menu-item" onclick="exitToLobby(); toggleSideMenu()">🎮 Игры</a>
        <a href="#" class="menu-item" onclick="alert('Будет в Бонусах')">🎁 Бонусы</a>
        <a href="#" class="menu-item" onclick="alert('Будет в Рефералах')">👥 Рефералы</a>
        <a href="https://t.me/твой_саппорт" class="menu-item" style="color:#3498db;">🎧 Поддержка</a>
    </div>

    <div id="res-popup" class="res-overlay"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 100.00;

        function updateBal() { document.getElementById('balance').innerText = balance.toFixed(2); }

        function toggleSideMenu() { document.getElementById('side-menu').classList.toggle('open'); }

        function showGame(game) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById(game + '-game').style.display = 'flex';
            if(game === 'mines') createMinesGrid();
        }

        function exitToLobby() {
            document.getElementById('lobby').style.display = 'flex';
            document.querySelectorAll('.game-screen').forEach(s => s.style.display = 'none');
        }

        // --- DICE LOGIC ---
        const diceBetInput = document.getElementById('dice-bet');
        const diceChanceInput = document.getElementById('dice-chance');
        
        function updateDice() {
            let chance = parseFloat(diceChanceInput.value) || 1;
            if(chance > 95) chance = 95;
            document.getElementById('d-mult').innerText = (97 / chance).toFixed(2);
            let thr = Math.floor(chance * 10000);
            document.getElementById('r-less').innerText = `0 - ${thr-1}`;
            document.getElementById('r-more').innerText = `${1000000-thr} - 999999`;
        }
        diceChanceInput.oninput = updateDice;

        function editBet(m) {
            let b = parseFloat(diceBetInput.value);
            if(m==='min') b=1; if(m==='x2') b*=2; if(m==='/2') b/=2; if(m==='max') b=balance;
            diceBetInput.value = b.toFixed(2);
        }

        function editChance(m) {
            let c = parseFloat(diceChanceInput.value);
            if(m==='min') c=1; if(m==='x2') c=Math.min(95,c*2); if(m==='/2') c=Math.max(1,c/2); if(m==='max') c=95;
            diceChanceInput.value = c.toFixed(2); updateDice();
        }

        function playDice(t) {
            let b = parseFloat(diceBetInput.value);
            let c = parseFloat(diceChanceInput.value);
            if(b > balance || b <= 0) return alert("Баланс!");
            balance -= b; updateBal();
            let roll = Math.floor(Math.random() * 1000000);
            let thr = Math.floor(c * 10000);
            let win = (t === 'less') ? (roll < thr) : (roll >= (1000000 - thr));
            showRes(roll, win);
            if(win) { balance += b * (97/c); updateBal(); tg.HapticFeedback.notificationOccurred('success'); }
            else { tg.HapticFeedback.notificationOccurred('error'); }
        }

        // --- MINES LOGIC ---
        let bPos = []; let mAct = false; let mOp = 0; let mB = 0;
        function createMinesGrid() {
            const g = document.getElementById('m-grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => clickM(i); g.appendChild(c);
            }
        }
        function startMines() {
            let b = parseFloat(document.getElementById('m-bet-val').value);
            let cnt = parseInt(document.getElementById('m-bomb-val').value);
            if(b > balance || cnt < 2 || cnt > 24) return alert("Данные!");
            balance -= b; mB = b; updateBal();
            mAct = true; mOp = 0; bPos = [];
            while(bPos.length < cnt) { let r = Math.floor(Math.random()*25); if(!bPos.includes(r)) bPos.push(r); }
            document.getElementById('m-btn-start').style.display='none';
            document.getElementById('m-btn-cash').style.display='block';
            document.getElementById('m-exit').style.display='none';
            updMUI(); createMinesGrid();
        }
        function clickM(i) {
            if(!mAct) return;
            const cs = document.querySelectorAll('.cell');
            if(cs[i].classList.contains('win')) return;
            if(bPos.includes(i)) { endM(false); }
            else { cs[i].classList.add('win'); cs[i].innerText = '💎'; mOp++; updMUI(); }
        }
        function gM(o) {
            let b = bPos.length;
            function f(n,k) { let r=1; for(let i=1;i<=k;i++) r=r*(n-i+1)/i; return r; }
            return (0.97 / (f(25-o, b) / f(25, b)));
        }
        function updMUI() {
            let c = gM(mOp); let n = gM(mOp+1);
            document.getElementById('m-mult').innerText = `x${c.toFixed(2)}`;
            document.getElementById('m-next').innerText = `Следующий шаг: x${n.toFixed(2)} (+${(mB*n - mB*c).toFixed(2)}₽)`;
            document.getElementById('m-btn-cash').innerText = `ЗАБРАТЬ ${(mB*c).toFixed(2)}₽`;
        }
        function cashMines() { balance += mB * gM(mOp); updateBal(); endM(true); }
        function endM(win) {
            mAct = false; const cs = document.querySelectorAll('.cell');
            bPos.forEach(p => { cs[p].innerText = '💣'; cs[p].classList.add('lose'); });
            document.getElementById('m-btn-start').style.display='block';
            document.getElementById('m-btn-cash').style.display='none';
            document.getElementById('m-exit').style.display='block';
        }

        function showRes(v, w) {
            const p = document.getElementById('res-popup');
            p.innerText = v; p.style.display = 'block';
            p.style.background = w ? '#2ecc71' : '#e74c3c';
            setTimeout(() => p.style.display = 'none', 1500);
        }const u = tg.initDataUnsafe.user;
        if(u && u.photo_url) document.getElementById('user-pic').src = u.photo_url;
        updateDice();
    </script>
</body>
</html>
