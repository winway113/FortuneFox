<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --orange: #f39c12; --bg: #121212; --card: #1c1c1c; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .header { height: 60px; background: #1a1a1a; border-bottom: 2px solid var(--orange); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .bal-box { background: #252525; padding: 8px 12px; border-radius: 10px; border: 1px solid #333; font-weight: 800; color: var(--green); }
        .app-container { margin-top: 60px; height: calc(100vh - 60px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; flex-direction: column; gap: 15px; }
        .active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #2a2a2a; width: 100%; position: relative; overflow: hidden; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; text-align: center; }
        .btn:active { transform: scale(0.97); }
        .btn-main { background: var(--orange); color: black; width: 100%; }
        .btn-sec { background: #333; color: white; width: 100%; }
        .btn-green { background: var(--green); color: black; width: 100%; }
        .input-box { background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; width: 100%; }
        .input-box label { font-size: 10px; color: #666; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .input-row { display: flex; align-items: center; gap: 5px; }
        .input-row input { background: none; border: none; color: white; font-size: 18px; width: 100%; outline: none; font-weight: bold; }
        .ctrl-btn { background: #252525; padding: 6px 4px; border-radius: 5px; font-size: 10px; border: 1px solid #444; min-width: 35px; text-align: center; color: #fff; cursor: pointer; }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 10px 0; width: 100%; }
        .cell { aspect-ratio: 1/1; background: #252525; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .cell.gem { background: var(--green) !important; border-color: white; }
        .cell.bomb { background: var(--red) !important; border-color: white; }
        .case-roulette { width: 100%; height: 100px; background: #111; border: 2px solid var(--orange); border-radius: 12px; position: relative; overflow: hidden; margin-bottom: 15px; }
        .case-pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: var(--orange); z-index: 10; }
        .case-tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .case-item{ min-width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid #222; font-weight: bold; font-size: 14px; background: #1a1a1a; color: #fff; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #1a1a1a; z-index: 2000; transition: 0.3s; padding: 25px; border-right: 2px solid var(--orange); }
        .side-menu.open { left: 0; }
        .menu-link { padding: 18px 0; border-bottom: 1px solid #2a2a2a; display: block; color: white; text-decoration: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        .menu-fab { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1400; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="menu">
        <h2 style="color:var(--orange); margin-bottom:20px;">FortuneFox 🦊</h2>
        <a class="menu-link" onclick="showScreen('lobby')">🎰 Игры</a>
        <a class="menu-link" onclick="showScreen('bonus-screen')">🎁 Бонусы</a>
        <a class="menu-link" onclick="showScreen('ref-screen')">👥 Рефералы</a>
        <a class="menu-link" onclick="showScreen('top-screen')">🏆 Топ игроков</a>
        <a href="https://t.me/FortuneFox_support" class="menu-link">🛠 Поддержка</a>
        <button class="btn btn-sec" style="margin-top:20px;" onclick="toggleMenu()">ЗАКРЫТЬ</button>
    </div>

    <div class="header">
        <div class="bal-box"><span id="balance">0.00</span> ₽</div>
        <div style="font-weight: 900; color: var(--orange);">FORTUNE FOX</div>
        <div onclick="showScreen('dep-screen')" style="background:var(--orange); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; cursor:pointer;">+</div>
    </div>

    <div class="app-container">
        
        <div id="loading-screen" class="screen active" style="text-align:center; padding-top:80px; align-items:center;">
            <div style="font-size: 80px; margin-bottom:10px;">🦊</div>
            <h1 style="color:var(--orange);">FortuneFox</h1>
            <p style="color: #666;">Загрузка данных...</p>
        </div>

        <div id="reg-screen" class="screen" style="text-align:center; padding-top:80px; align-items:center;">
            <div style="font-size: 80px; margin-bottom:10px;">🦊</div>
            <h1>FortuneFox</h1>
            <button class="btn btn-main" style="margin-top:20px;" onclick="register()">НАЧАТЬ ИГРУ</button>
        </div>

        <div id="lobby" class="screen">
            <div class="card" style="height:100px; display:flex; align-items:center; justify-content:center; border: 2px solid var(--orange);" onclick="alert('Скоро!')">
                <h2 style="color:var(--orange);">🎰 СЛОТЫ</h2>
            </div>
            <div class="grid-2">
                <div class="card" onclick="showScreen('mines-game')" style="text-align:center;">💣 МИНЫ</div>
                <div class="card" onclick="showScreen('dice-game')" style="text-align:center;">🎲 DICE</div>
            </div>
            <div class="card" onclick="showScreen('cases-game')" style="text-align:center;">📦 КЕЙСЫ</div>
        </div>

        <div id="dice-game" class="screen">
            <div class="card">
                <div id="d-win-text" style="font-size:40px; font-weight:900; text-align:center; color:var(--orange);">20.00</div>
                <div id="d-result" style="text-align:center; padding:10px; border-radius:10px; margin:10px 0; display:none;"></div>
                <div class="input-box"><label>Ставка</label><input type="number" id="d-bet" value="10" oninput="updDice()"></div>
                <div class="input-box" style="margin-top:10px;"><label>Шанс %</label><input type="number" id="d-chance" value="50" oninput="updDice()"></div>
                <div class="grid-2" style="margin-top:15px;">
                    <button class="btn btn-main" onclick="playDice('less')">МЕНЬШЕ</button>
                    <button class="btn btn-main" onclick="playDice('more')">БОЛЬШЕ</button>
                </div>
            </div>
            <button class="btn btn-sec" onclick="showScreen('lobby')">НАЗАД</button>
        </div>

        <div id="mines-game" class="screen">
            <h2 id="m-coeff" style="text-align:center; color:var(--orange);">x0.00</h2>
            <div class="mines-grid" id="m-grid"></div>
            <div class="grid-2">
                <div class="input-box"><label>Ставка</label><input type="number" id="m-bet" value="10"></div>
                <div class="input-box"><label>Бомбы</label><input type="number" id="m-bombs" value="3"></div>
            </div>
            <button class="btn btn-main" id="m-start" onclick="startMines()">ИГРАТЬ</button>
            <button class="btn btn-green" id="m-cash" style="display:none;" onclick="cashMines()">ЗАБРАТЬ</button>
            <button class="btn btn-sec" onclick="showScreen('lobby')">НАЗАД</button>
        </div>

        <div id="cases-game" class="screen">
            <div id="case-selection" class="grid-2">
                <div class="card" onclick="openCaseMenu('c1')">📦 Новичок 10₽</div>
                <div class="card" onclick="openCaseMenu('c2')">📦 Обычный 50₽</div>
            </div>
            <div id="case-opening" class="card" style="display:none; text-align:center;">
                <div class="case-roulette"><div class="case-pointer"></div><div class="case-tape" id="tape"></div></div>
                <button class="btn btn-main" id="spin-btn" onclick="startCaseSpin()">ОТКРЫТЬ</button>
                <button class="btn btn-sec" onclick="closeCaseMenu()">НАЗАД</button>
            </div>
            <button class="btn btn-sec" id="cases-exit" onclick="showScreen('lobby')">В ЛОББИ</button>
        </div>

        <div id="top-screen" class="screen"><div class="card"><h2>🏆 ТОП</h2><div id="top-list"></div></div><button class="btn btn-sec" onclick="showScreen('lobby')">НАЗАД</button></div>
        <div id="dep-screen" class="screen"><div class="card"><h2>💳 ПОПОЛНЕНИЕ</h2><p>Минимум 50 ₽</p><button class="btn btn-main" onclick="alert('Система оплаты временно недоступна')">ОПЛАТИТЬ</button></div><button class="btn btn-sec" onclick="showScreen('lobby')">НАЗАД</button></div>
    </div>

    <div class="menu-fab" id="fab" style="display:none;" onclick="toggleMenu()">🦊</div>

    <script>
        let tg = window.Telegram.WebApp;
        let balance = 0.00;
        let user = tg.initDataUnsafe?.user || {id: 0, username: 'Guest'};
        let API_URL = "http://185.96.80.219:8000"; // ЗАМЕНИ НА СВОЙ IP

        tg.expand();

        // Главная функция загрузки
        async function loadUserBalance() {
            try {
                const response = await fetch(API_URL + '/api/get_balance', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: user.id})
                });
                const data = await response.json();
                if (data.balance !== undefined) {
                    balance = data.balance;
                    updateBal();
                    showScreen('lobby');
                    document.getElementById('fab').style.display = 'flex';
                }
            } catch (e) {
                console.error(e);
                // Если сервер не отвечает, все равно пускаем в лобби через 2 секунды
                setTimeout(() => { if(balance === 0) showScreen('lobby'); }, 2000);
            }
        }

        function register() { loadUserBalance(); }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('open');
            document.getElementById('overlay').style.display = document.getElementById('menu').classList.contains('open') ? 'block' : 'none';
        }
        function updateBal() { document.getElementById('balance').innerText = balance.toFixed(2); }

        // Простая логика Dice
        function updDice() {
            let b = parseFloat(document.getElementById('d-bet').value) || 0;
            let c = parseFloat(document.getElementById('d-chance').value) || 1;
            document.getElementById('d-win-text').innerText = (b * (95/c)).toFixed(2);
        }

        async function playDice(mode) {
            let b = parseFloat(document.getElementById('d-bet').value);
            let c = parseFloat(document.getElementById('d-chance').value);
            if(b > balance || b <= 0) return alert("Мало денег!");
            
            balance -= b; updateBal();
            let roll = Math.random() * 100;
            let win = mode === 'less' ? (roll <= c) : (roll >= (100-c));
            
            if(win) {
                let winAmount = b * (95/c);
                balance += winAmount;
                updateBal();
                alert("Победа! Выпало: " + roll.toFixed(2));
            } else {
                alert("Проигрыш! Выпало: " + roll.toFixed(2));
            }
            saveOnServer('dice', b, win ? b*(95/c) : 0);
        }

        async function saveOnServer(game, bet, win) {
            fetch(API_URL + '/api/save_game', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: user.id, game: game, bet: bet, win: win, result: win>0?'win':'lose'})
            });
            fetch(API_URL + '/api/update_balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: user.id, balance: balance})
            });
        }

        // Запуск
        setTimeout(() => {
            if (user.id !== 0) loadUserBalance();
            else document.getElementById('loading-screen').innerHTML = "<h1>Открыть в Telegram</h1>";
        }, 500);

        // Кейсы (базовая логика)
        function openCaseMenu() { showScreen('cases-game'); document.getElementById('case-selection').style.display='grid'; document.getElementById('case-opening').style.display='none'; }
        function closeCaseMenu() { openCaseMenu(); }
    </script>
</body>
</html>
