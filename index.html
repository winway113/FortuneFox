<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: sans-serif; user-select: none; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #1e1e1e; border-bottom: 2px solid #f39c12; }
        .balance-container { display: flex; align-items: center; background: #2b2b2b; padding: 5px 12px; border-radius: 10px; border: 1px solid #333; }
        .balance-amount { color: #2ecc71; font-weight: bold; margin-right: 5px; }
        .casino-name { font-size: 18px; font-weight: 800; color: #f39c12; text-transform: uppercase; }
        .user-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #f39c12; }

        .lobby { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .game-card { background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* ОБЩИЕ СТИЛИ ИГР */
        .game-screen { display: none; flex-direction: column; padding: 15px; align-items: center; }
        .bottom-panel { background: #1e1e1e; width: 100%; padding: 15px; border-radius: 20px 20px 0 0; border-top: 2px solid #333; position: fixed; bottom: 0; left: 0; box-sizing: border-box; }
        
        /* DICE СТИЛИ */
        .dice-display { width: 100%; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; }
        .result-box { padding: 15px 30px; border-radius: 12px; font-size: 24px; font-weight: bold; display: none; margin-top: 10px; }
        .win-box { background: rgba(46, 204, 113, 0.2); border: 2px solid #2ecc71; color: #2ecc71; display: block; }
        .lose-box { background: rgba(231, 76, 60, 0.2); border: 2px solid #e74c3c; color: #e74c3c; display: block; }
        
        .control-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .btn-group { display: flex; gap: 5px; }
        .small-btn { flex: 1; background: #333; border: 1px solid #444; color: white; padding: 8px 0; border-radius: 6px; font-size: 12px; }
        input { background: #2b2b2b; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .play-btn { background: #f39c12; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 18px; width: 100%; }
        .dice-ranges { display: flex; justify-content: space-between; width: 100%; color: #aaa; font-size: 12px; margin-top: 5px; }

        .btn-exit { background: none; color: #f39c12; border: 1px solid #f39c12; padding: 8px; border-radius: 8px; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container"><span class="balance-amount" id="balance">100.00</span> ₽</div>
        <div class="casino-name">FortuneFox</div>
        <img id="user-pic" class="user-avatar" src="https://ui-avatars.com/api/?name=U">
    </div>

    <!-- ЛОББИ -->
    <div id="lobby" class="lobby">
        <div class="game-card" onclick="alert('Скоро!')">🎰 СЛОТЫ</div>
        <div class="game-card" onclick="showGame('mines')">💣 МИНЫ (Клетки)</div>
        <div class="game-card" style="border: 1px solid #f39c12;" onclick="showGame('dice')">🎲 DICE (Больше/Меньше)</div>
        <div class="game-card" onclick="alert('Скоро!')">📦 КЕЙСЫ</div>
    </div>

    <!-- ИГРА DICE -->
    <div id="dice-game" class="game-screen">
        <div class="dice-display">
            <div id="dice-status" style="font-size: 18px; color: #f39c12; margin-bottom: 10px;">Установите ставку и шанс</div>
            <div id="result-rect" class="result-box">0</div>
        </div>

        <div class="bottom-panel">
            <div class="control-row">
                <input type="number" id="dice-bet" value="10">
                <div class="btn-group">
                    <button class="small-btn" onclick="setDiceBet('min')">min</button>
                    <button class="small-btn" onclick="setDiceBet('/2')">/2</button>
                    <button class="small-btn" onclick="setDiceBet('x2')">x2</button>
                    <button class="small-btn" onclick="setDiceBet('max')">max</button>
                </div>
            </div>

            <div class="control-row">
                <input type="number" id="dice-chance" value="50" step="0.01">
                <div class="btn-group">
                    <button class="small-btn" onclick="setDiceChance('min')">min</button>
                    <button class="small-btn" onclick="setDiceChance('/2')">/2</button>
                    <button class="small-btn" onclick="setDiceChance('x2')">x2</button>
                    <button class="small-btn" onclick="setDiceChance('max')">max</button>
                </div>
            </div>

            <div class="btn-group" style="margin-bottom: 10px;">
                <button class="play-btn" style="background:#2980b9" onclick="playDice('less')">МЕНЬШЕ</button>
                <button class="play-btn" style="background:#8e44ad" onclick="playDice('more')">БОЛЬШЕ</button>
            </div>
            
            <div id="dice-payout" style="text-align:center; font-size: 14px; color: #2ecc71; margin-bottom: 5px;">Выплата: 19.40₽</div>
            <button class="btn-exit" onclick="hideGames()">ВЫЙТИ</button>
        </div>
    </div>

    <!-- (Здесь остается код игры МИНЫ из прошлого шага, но для экономии места я его пропущу) -->

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 100.00;

        function updateBal() { document.getElementById('balance').innerText = balance.toFixed(2); }

        function showGame(game) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById(game + '-game').style.display = 'flex';
        }

        function hideGames() {
            document.getElementById('lobby').style.display = 'flex';
            document.querySelectorAll('.game-screen').forEach(s => s.style.display = 'none');
        }

        // --- ЛОГИКА DICE ---
        const diceBetInput = document.getElementById('dice-bet');
        const diceChanceInput = document.getElementById('dice-chance');
        const payoutDisplay = document.getElementById('dice-payout');

        function setDiceBet(mode) {
            let val = parseFloat(diceBetInput.value);
            if (mode === 'min') val = 1;
            if (mode === '/2') val = Math.max(1, val / 2);
            if (mode === 'x2') val = val * 2;
            if (mode === 'max') val = balance;
            diceBetInput.value = val.toFixed(2);
            updateDicePayout();
        }

        function setDiceChance(mode) {
            let val = parseFloat(diceChanceInput.value);
            if (mode === 'min') val = 1;
            if (mode === '/2') val = Math.max(1, val / 2);
            if (mode === 'x2') val = Math.min(95, val * 2);
            if (mode === 'max') val = 95;
            diceChanceInput.value = val.toFixed(2);
            updateDicePayout();
        }

        function updateDicePayout() {
            let bet = parseFloat(diceBetInput.value);
            let chance = parseFloat(diceChanceInput.value);
            let payout = (bet * (97 / chance)).toFixed(2);// 3% маржа
            payoutDisplay.innerText = `Выплата: ${payout}₽`;
        }

        diceChanceInput.oninput = updateDicePayout;
        diceBetInput.oninput = updateDicePayout;

        function playDice(type) {
            let bet = parseFloat(diceBetInput.value);
            let chance = parseFloat(diceChanceInput.value);
            if (bet > balance || bet <= 0) return alert("Недостаточно баланса!");

            balance -= bet;
            updateBal();

            let roll = Math.floor(Math.random() * 1000000);
            let win = false;
            let threshold = Math.floor(chance * 10000);

            if (type === 'less') {
                if (roll <= threshold) win = true;
            } else {
                if (roll >= (1000000 - threshold)) win = true;
            }

            const resBox = document.getElementById('result-rect');
            resBox.innerText = roll;
            resBox.className = 'result-box ' + (win ? 'win-box' : 'lose-box');
            
            if (win) {
                let winAmt = bet * (97 / chance);
                balance += winAmt;
                updateBal();
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }
        }
    </script>
</body>
</html>
