<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --orange: #f39c12; --bg: #121212; --card: #1c1c1c; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .header { height: 60px; background: #1a1a1a; border-bottom: 2px solid var(--orange); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .bal-box { background: #252525; padding: 8px 12px; border-radius: 10px; color: var(--green); font-weight: bold; }
        .app-container { margin-top: 60px; height: calc(100vh - 60px); overflow-y: auto; padding: 15px; }
        .screen { display: none; flex-direction: column; gap: 15px; }
        .active { display: flex !important; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #2a2a2a; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-main { background: var(--orange); color: black; width: 100%; }
        .btn-sec { background: #333; color: white; width: 100%; }
        /* Кейсы */
        .case-roulette { width: 100%; height: 80px; background: #111; border: 2px solid var(--orange); position: relative; overflow: hidden; margin-bottom: 10px; }
        .case-tape { display: flex; position: absolute; left: 0; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .case-item { min-width: 70px; height: 80px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #222; font-weight: bold; }
        /* Меню */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #1a1a1a; z-index: 2000; transition: 0.3s; padding: 25px; border-right: 2px solid var(--orange); }
        .side-menu.open { left: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="menu">
        <h2 style="color:var(--orange);">меню</h2>
        <div onclick="showScreen('lobby')" style="padding:15px 0; cursor:pointer;">🎰 Игры</div>
        <div onclick="showScreen('bonus-screen')" style="padding:15px 0; cursor:pointer;">🎁 Бонусы</div>
        <div onclick="showScreen('ref-screen')" style="padding:15px 0; cursor:pointer;">👥 Рефералы</div>
        <button class="btn btn-sec" style="margin-top:20px;" onclick="toggleMenu()">ЗАКРЫТЬ</button>
    </div>

    <div class="header">
        <div class="bal-box"><span id="balance">0.00</span> ₽</div>
        <div style="color: var(--orange); font-weight: bold;">FORTUNE FOX</div>
        <div onclick="toggleMenu()" style="font-size: 24px;">☰</div>
    </div>

    <div class="app-container">
        
        <div id="reg-screen" class="screen active" style="text-align:center;">
            <div style="font-size: 60px; margin-top: 50px;">🦊</div>
            <h1 style="color:var(--orange);">FortuneFox</h1>
            <p id="welcome-text">Загрузка...</p>
            <button id="start-btn" class="btn btn-main" style="display:none; margin-top:20px;" onclick="showScreen('lobby')">ИГРАТЬ</button>
        </div>

        <div id="lobby" class="screen">
            <div class="card" onclick="alert('В разработке')"><h2>🎰 СЛОТЫ</h2></div>
            <div class="grid-2">
                <div class="card" onclick="showScreen('mines-game')">💣 МИНЫ</div>
                <div class="card" onclick="showScreen('dice-game')">🎲 DICE</div>
            </div>
            <div class="card" onclick="showScreen('cases-game')">📦 КЕЙСЫ</div>
        </div>

        <!-- DICE -->
        <div id="dice-game" class="screen">
            <div class="card">
                <h2 id="d-win-text" style="text-align:center; color:var(--orange);">20.00</h2>
                <input type="number" id="d-bet" value="10" style="width:100%; padding:10px; margin:10px 0; background:#111; color:white; border:1px solid #333;">
                <input type="number" id="d-chance" value="50" style="width:100%; padding:10px; margin:10px 0; background:#111; color:white; border:1px solid #333;">
                <div class="grid-2">
                    <button class="btn btn-main" onclick="playDice('less')">МЕНЬШЕ</button>
                    <button class="btn btn-main" onclick="playDice('more')">БОЛЬШЕ</button>
                </div>
            </div>
            <button class="btn btn-sec" onclick="showScreen('lobby')">НАЗАД</button>
        </div>

        <!-- КЕЙСЫ -->
        <div id="cases-game" class="screen">
            <div id="case-selection" class="grid-2">
                <div class="card" onclick="openCaseMenu('c1')">📦 Новичок<br>10₽</div>
                <div class="card" onclick="openCaseMenu('c2')">📦 Обычный<br>50₽</div>
                <div class="card" onclick="openCaseMenu('fox')">🦊 FOX<br>5000₽</div>
            </div>
            <div id="case-opening" class="card" style="display:none; text-align:center;">
                <h3 id="case-title">КЕЙС</h3>
                <div class="case-roulette"><div class="case-tape" id="tape"></div></div>
                <button class="btn btn-main" id="spin-btn" onclick="startCaseSpin()">ОТКРЫТЬ</button>
                <button class="btn btn-sec" style="margin-top:10px;" onclick="closeCaseMenu()">НАЗАД</button>
            </div>
        </div>

        <!-- БОНУСЫ -->
        <div id="bonus-screen" class="screen">
            <div class="card">
                <h3>🎟 ПРОМОКОД</h3>
                <input type="text" class="btn btn-sec" style="width:100%; text-align:left; margin:10px 0;" placeholder="Введите код...">
                <button class="btn btn-main">АКТИВИРОВАТЬ</button>
            </div>
            <div class="card">
                <h3>🎁 БОНУС 24Ч</h3>
                <button class="btn btn-sec" onclick="getDaily()">ПОЛУЧИТЬ</button>
            </div>
            <button class="btn btn-sec" onclick="showScreen('lobby')">НАЗАД</button>
        </div>

    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let balance = 0.00;
        let isSpinning = false;

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            balance = parseFloat(params.get('bal')) || 0;
            document.getElementById('welcome-text').innerText = "Баланс: " + balance.toFixed(2) + " ₽";
            document.getElementById('start-btn').style.display = "block";
            updateBal();
        };

        function saveToDB() {
            // ОТПРАВКА БАЛАНСА БОТУ
            tg.sendData(JSON.stringify({new_balance: balance.toFixed(2)}));
        }

        function updateBal() { 
            document.getElementById('balance').innerText = balance.toFixed(2); 
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('menu').classList.contains('open')) toggleMenu();
        }

        function toggleMenu() {
            const m = document.getElementById('menu');
            m.classList.toggle('open');
            document.getElementById('overlay').style.display = m.classList.contains('open') ? 'block' : 'none';
        }

        function playDice(mode) {
            let b = parseFloat(document.getElementById('d-bet').value);
            let c = parseFloat(document.getElementById('d-chance').value);
            if(b > balance || b <= 0) return;
            balance -= b;
            let roll = Math.random() * 100;
            if(mode === 'less' && roll <= c) balance += (b * (95/c));
            if(mode === 'more' && roll >= (100-c)) balance += (b * (95/c));
            updateBal();
            saveToDB(); // СОХРАНЯЕМ В БД
        }

        const cases = {
            'c1': { name: 'НОВИЧОК', price: 10, items: [2, 5, 10, 20, 50] },
            'c2': { name: 'ОБЫЧНЫЙ', price: 50, items: [10, 20, 50, 100, 200] },
            'fox': { name: 'FOX', price: 5000, items: [1000, 5000, 10000] }
        };
        let activeCase = null;

        function openCaseMenu(id) {
            activeCase = cases[id];
            document.getElementById('case-title').innerText = activeCase.name;
            document.getElementById('case-selection').style.display = 'none';
            document.getElementById('case-opening').style.display = 'block';
            fillTape();
        }

        function fillTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            for(let i=0; i<30; i++) {
                let v = activeCase.items[Math.floor(Math.random()*activeCase.items.length)];
                tape.innerHTML += `<div class="case-item">${v}₽</div>`;
            }
        }

        function startCaseSpin() {
            if(balance < activeCase.price || isSpinning) return;
            balance -= activeCase.price;
            updateBal();
            isSpinning = true;
            const tape = document.getElementById('tape');
            const winVal = activeCase.items[Math.floor(Math.random()*activeCase.items.length)];
            tape.children[25].innerText = winVal + "₽";
            tape.style.transform = `translateX(-${25 * 70 - 100}px)`;
            setTimeout(() => {
                balance += winVal;
                updateBal();
                saveToDB(); // СОХРАНЯЕМ В БД
                isSpinning = false;
                alert("Выпало: " + winVal + "₽");
                tape.style.transition = 'none';
                tape.style.transform = 'translateX(0)';
                closeCaseMenu();
            }, 4500);
        }

        function closeCaseMenu() {
            document.getElementById('case-selection').style.display = 'grid';
            document.getElementById('case-opening').style.display = 'none';
        }

        function getDaily() {
            let win = Math.floor(Math.random() * 24) + 1;
            balance += win;
            updateBal();
            saveToDB();
            alert("Бонус: " + win + "₽");
        }
    </script>
</body>
</html>
