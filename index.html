<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --orange: #f39c12; --bg: #121212; --card: #1c1c1c; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .header { height: 60px; background: #1a1a1a; border-bottom: 2px solid var(--orange); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .bal-box { background: #252525; padding: 8px 12px; border-radius: 10px; color: var(--green); font-weight: bold; }
        .app-container { margin-top: 60px; height: calc(100vh - 60px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; flex-direction: column; gap: 15px; }
        .active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #2a2a2a; width: 100%; text-align: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--orange); color: black; width: 100%; }
        .btn-sec { background: #333; color: white; width: 100%; }
        .input-box { background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; width: 100%; margin-bottom: 10px; }
        .input-box input { background: none; border: none; color: white; width: 100%; text-align: center; font-size: 18px; outline: none; }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; margin: 10px 0; }
        .cell { aspect-ratio: 1/1; background: #252525; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #333; }
        .cell.gem { background: var(--green) !important; }
        .cell.bomb { background: var(--red) !important; }
        
        /* Кейсы */
        .case-roulette { width: 100%; height: 80px; background: #111; border: 2px solid var(--orange); border-radius: 12px; position: relative; overflow: hidden; }
        .case-tape { display: flex; position: absolute; left: 0; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .case-item { min-width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #222; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-box"><span id="balance">100.00</span> ₽</div>
        <div style="color: var(--orange); font-weight: bold;">FORTUNE FOX</div>
        <div style="background:var(--orange); width:30px; height:30px; border-radius:5px; color:black; display:flex; align-items:center; justify-content:center; font-weight:bold;">+</div>
    </div>

    <div class="app-container">
        <!-- Регистрация -->
        <div id="reg-screen" class="screen active">
            <div style="font-size: 60px; margin-top: 50px;">🦊</div>
            <h2>FortuneFox</h2>
            <p style="color: #666; margin-bottom: 20px;">Добро пожаловать!</p>
            <button class="btn btn-main" onclick="showScreen('lobby')">ИГРАТЬ</button>
        </div>

        <!-- Лобби -->
        <div id="lobby" class="screen">
            <div class="card" style="border: 2px solid var(--orange);">🎰 СЛОТЫ (В РАЗРАБОТКЕ)</div>
            <div class="grid-2">
                <div class="card" onclick="showScreen('mines-game')">💣 МИНЫ</div>
                <div class="card" onclick="showScreen('dice-game')">🎲 DICE</div></div>
            <div class="card" onclick="showScreen('cases-game')">📦 КЕЙСЫ</div>
        </div>

        <!-- DICE -->
        <div id="dice-game" class="screen">
            <div class="card">
                <h3 id="d-win-text" style="color:var(--orange); font-size:30px;">20.00</h3>
                <div class="input-box"><label>Ставка</label><input type="number" id="d-bet" value="10"></div>
                <div class="input-box"><label>Шанс %</label><input type="number" id="d-chance" value="50"></div>
                <button class="btn btn-main" onclick="playDice()">ИГРАТЬ</button>
            </div>
            <button class="btn btn-sec" onclick="showScreen('lobby')">НАЗАД</button>
        </div>

        <!-- МИНЫ -->
        <div id="mines-game" class="screen">
            <h2 id="m-coeff" style="color:var(--orange)">x0.00</h2>
            <div class="mines-grid" id="m-grid"></div>
            <div class="input-box"><input type="number" id="m-bet" value="10"></div>
            <button class="btn btn-main" id="m-start" onclick="startMines()">СТАРТ</button>
            <button class="btn btn-main" id="m-cash" style="display:none; background:var(--green)" onclick="cashMines()">ЗАБРАТЬ</button>
            <button class="btn btn-sec" style="margin-top:10px;" onclick="showScreen('lobby')">НАЗАД</button>
        </div>

        <!-- КЕЙСЫ -->
        <div id="cases-game" class="screen">
            <div id="case-selection" class="grid-2">
                <div class="card" onclick="openCaseMenu(10)">📦 Новичок<br>10 ₽</div>
                <div class="card" onclick="openCaseMenu(100)">📦 Профи<br>100 ₽</div>
            </div>
            <div id="case-opening" class="card" style="display:none;">
                <div class="case-roulette"><div class="case-tape" id="tape"></div></div>
                <button class="btn btn-main" id="spin-btn" style="margin-top:15px;" onclick="startCase()">ОТКРЫТЬ</button>
                <button class="btn btn-sec" style="margin-top:10px;" onclick="location.reload()">НАЗАД</button>
            </div>
            <button class="btn btn-sec" onclick="showScreen('lobby')">В ЛОББИ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let balance = 100.00;

        tg.onEvent('message', (e) => {
            if (e.data.startsWith('BALANCE_UPDATE:')) {
                balance = parseFloat(e.data.split(':')[1]);
                document.getElementById('balance').innerText = balance.toFixed(2);
            }
        });

        function sendToBot(action, data = {}) {
            data.action = action;
            tg.sendData(JSON.stringify(data));
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'lobby') sendToBot('get_balance');
        }

        // DICE
        function playDice() {
            let b = parseFloat(document.getElementById('d-bet').value);
            if(b > balance) return tg.showAlert("Мало денег");
            sendToBot('update_balance', {amount: b, type: 'subtract', game_name: 'Dice'});
            setTimeout(() => {
                if(Math.random() > 0.5) sendToBot('update_balance', {amount: b*1.9, type: 'add', game_name: 'Dice'});
            }, 500);
        }

        // MINES
        let mData = {active: false, b: 0, bombs: []};
        function startMines() {
            let b = parseFloat(document.getElementById('m-bet').value);
            if(b > balance) return tg.showAlert("Мало денег");
            sendToBot('update_balance', {amount: b, type: 'subtract', game_name: 'Mines'});
            mData = {active: true, b: b, bombs: [Math.floor(Math.random()*25)]};
            document.getElementById('m-grid').innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => {
                    if(!mData.active) return;if(mData.bombs.includes(i)) {
                        c.classList.add('bomb'); c.innerText='💣'; mData.active=false; tg.showAlert("БОМБА!");
                        setTimeout(()=>showScreen('lobby'), 1500);
                    } else {
                        c.classList.add('gem'); c.innerText='💎';
                        document.getElementById('m-cash').style.display = 'block';
                    }
                };
                document.getElementById('m-grid').appendChild(c);
            }
            document.getElementById('m-start').style.display='none';
        }
        function cashMines() {
            sendToBot('update_balance', {amount: mData.b*1.5, type: 'add', game_name: 'Mines'});
            showScreen('lobby');
        }

        // КЕЙСЫ
        let currentCasePrice = 0;
        function openCaseMenu(price) {
            currentCasePrice = price;
            document.getElementById('case-selection').style.display='none';
            document.getElementById('case-opening').style.display='block';
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            for(let i=0; i<40; i++) tape.innerHTML += `<div class="case-item">${Math.floor(Math.random()*price*2)}₽</div>`;
        }
        function startCase() {
            if(balance < currentCasePrice) return tg.showAlert("Мало денег");
            sendToBot('update_balance', {amount: currentCasePrice, type: 'subtract', game_name: 'Cases'});
            const tape = document.getElementById('tape');
            let win = Math.floor(Math.random()*currentCasePrice*2);
            tape.children[35].innerText = win + "₽";
            tape.style.transform = "translateX(-2800px)";
            setTimeout(() => {
                sendToBot('update_balance', {amount: win, type: 'add', game_name: 'Cases'});
                tg.showAlert("Выигрыш: " + win + "₽");
            }, 4100);
        }

        tg.expand();
        sendToBot('get_balance');
    </script>
</body>
</html>
