<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortuneFox Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --orange: #f39c12; --green: #2ecc71; --red: #e74c3c; --bg: #f5f6fa; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: #2f3640; font-family: 'Segoe UI', sans-serif; user-select: none; overflow: hidden; }
        
        /* Темная шапка для контраста */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #2f3640; color: white; }
        .balance-container { display: flex; align-items: center; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 10px; }
        .balance-amount { color: var(--green); font-weight: bold; margin-right: 5px; }

        /* Контейнер игры (Светлый стиль как на фото) */
        .game-area { background: white; margin: 15px; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; flex-direction: column; align-items: center; }
        
        /* Стили DICE */
        .dice-row { display: flex; gap: 15px; width: 100%; margin-bottom: 20px; }
        .dice-box { flex: 1; }
        .dice-box label { display: block; text-align: center; color: #7f8c8d; margin-bottom: 8px; font-size: 14px; }
        .input-wrapper { border: 2px solid #edeff2; border-radius: 12px; padding: 10px; text-align: center; }
        .input-wrapper input { border: none; width: 100%; text-align: center; font-size: 20px; font-weight: bold; outline: none; color: #2f3640; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 8px; }
        .btn-grid button { border: 1px solid #edeff2; background: white; padding: 5px 0; border-radius: 6px; font-size: 11px; color: #7f8c8d; }

        .big-mult { font-size: 64px; font-weight: bold; color: #2f3640; margin: 10px 0; }
        .sub-text { color: #bdc3c7; font-size: 14px; margin-bottom: 20px; }
        
        .range-info { display: flex; justify-content: space-between; width: 100%; color: #bdc3c7; font-size: 12px; margin-bottom: 8px; padding: 0 10px; }
        .play-btns { display: flex; gap: 10px; width: 100%; }
        .play-btns button { flex: 1; padding: 15px; border: none; border-radius: 12px; color: #7f8c8d; background: #edeff2; font-weight: bold; font-size: 16px; }

        /* Стили МИНЫ */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; margin-bottom: 20px; }
        .cell { aspect-ratio: 1/1; background: #edeff2; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; border: 2px solid transparent; }
        .cell.win { background: rgba(46, 204, 113, 0.1); border-color: var(--green); }
        .cell.lose { background: rgba(231, 76, 60, 0.1); border-color: var(--red); }
        .next-step-info { color: var(--orange); font-size: 14px; margin-bottom: 10px; font-weight: bold; }

        .result-rect { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; border-radius: 15px; font-size: 32px; font-weight: bold; color: white; z-index: 100; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container"><span class="balance-amount" id="balance">100.00</span> ₽</div>
        <div style="font-weight: 800; color: var(--orange);">FORTUNEFOX</div>
        <img id="user-pic" style="width:34px; border-radius:50%;" src="https://ui-avatars.com/api/?name=U">
    </div>

    <!-- ЛОББИ -->
    <div id="lobby" style="padding: 20px;">
        <div onclick="openGame('mines')" style="background:white; padding:20px; border-radius:15px; margin-bottom:10px; text-align:center; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">💣 МИНЫ</div>
        <div onclick="openGame('dice')" style="background:white; padding:20px; border-radius:15px; margin-bottom:10px; text-align:center; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">🎲 DICE</div>
    </div>

    <!-- DICE GAME -->
    <div id="dice-game" class="game-area">
        <div class="dice-row">
            <div class="dice-box">
                <label>Ставка</label>
                <div class="input-wrapper"><input type="number" id="dice-bet" value="1.00"></div>
                <div class="btn-grid">
                    <button onclick="editDiceBet('min')">Мин.</button>
                    <button onclick="editDiceBet('x2')">X2</button>
                    <button onclick="editDiceBet('/2')">1/2</button>
                    <button onclick="editDiceBet('max')">Макс.</button>
                </div>
            </div>
            <div class="dice-box">
                <label>Шанс</label>
                <div class="input-wrapper"><input type="number" id="dice-chance" value="80.00"></div>
                <div class="btn-grid">
                    <button onclick="editDiceChance('min')">Мин.</button>
                    <button onclick="editDiceChance('x2')">X2</button>
                    <button onclick="editDiceChance('/2')">1/2</button>
                    <button onclick="editDiceChance('max')">Макс.</button>
                </div>
            </div>
        </div>

        <div class="big-mult" id="dice-mult">1.21</div>
        <div class="sub-text">Возможный выигрыш</div>

        <div class="range-info">
            <span id="range-less">0 - 799999</span>
            <span id="range-more">200000 - 999999</span>
        </div>
        <div class="play-btns">
            <button onclick="playDice('less')">Меньше</button>
            <button onclick="playDice('more')">Больше</button>
        </div>
        <button onclick="closeGame()" style="margin-top:20px; background:none; border:none; color:#bdc3c7;">ВЫЙТИ</button>
    </div>

    <!-- MINES GAME -->
    <div id="mines-game" class="game-area">
        <div id="mines-mult-display" style="font-size:32px; font-weight:bold;">x1.00</div>
        <div id="next-step" class="next-step-info">Следующий шаг: x1.14</div>
        
        <div class="mines-grid" id="grid"></div>

        <input type="number" id="mines-bet" value="10" style="width:100%; padding:12px; border:2px solid #edeff2; border-radius:12px; margin-bottom:10px; box-sizing:border-box;">
        <input type="number" id="mines-bombs" value="3" style="width:100%; padding:12px; border:2px solid #edeff2; border-radius:12px; margin-bottom:10px; box-sizing:border-box;">
        
        <button id="mines-start" onclick="startMines()" style="width:100%; padding:15px; border:none; border-radius:12px; background:var(--orange); color:white; font-weight:bold; font-size:16px;">ИГРАТЬ</button>
        <button id="mines-cashout" onclick="cashoutMines()" style="width:100%; padding:15px; border:none; border-radius:12px; background:var(--green); color:white; font-weight:bold; font-size:16px; display:none;">ЗАБРАТЬ</button>
        <button onclick="closeGame()" id="mines-exit" style="margin-top:15px; background:none; border:none; color:#bdc3c7;">ВЫЙТИ</button>
    </div>

    <div id="result-overlay" class="result-rect"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 100.00;

        function updateBal() { document.getElementById('balance').innerText = balance.toFixed(2); }

        function openGame(game) {document.getElementById('lobby').style.display = 'none';
            document.getElementById(game + '-game').style.display = 'flex';
            if(game === 'mines') createMinesGrid();
        }

        function closeGame() {
            document.getElementById('lobby').style.display = 'block';
            document.querySelectorAll('.game-area').forEach(a => a.style.display = 'none');
        }

        // --- ЛОГИКА DICE ---
        const dBet = document.getElementById('dice-bet');
        const dChance = document.getElementById('dice-chance');
        const dMult = document.getElementById('dice-mult');

        function updateDiceInfo() {
            let chance = parseFloat(dChance.value);
            if(chance > 95) chance = 95;
            let mult = (97 / chance).toFixed(2);
            dMult.innerText = mult;
            let threshold = Math.floor(chance * 10000);
            document.getElementById('range-less').innerText = `0 - ${threshold - 1}`;
            document.getElementById('range-more').innerText = `${1000000 - threshold} - 999999`;
        }
        dChance.oninput = updateDiceInfo;

        function editDiceBet(mode) {
            let b = parseFloat(dBet.value);
            if(mode === 'min') b = 1;
            if(mode === 'x2') b *= 2;
            if(mode === '/2') b /= 2;
            if(mode === 'max') b = balance;
            dBet.value = b.toFixed(2);
        }

        function editDiceChance(mode) {
            let c = parseFloat(dChance.value);
            if(mode === 'min') c = 1;
            if(mode === 'x2') c = Math.min(95, c*2);
            if(mode === '/2') c = Math.max(1, c/2);
            if(mode === 'max') c = 95;
            dChance.value = c.toFixed(2);
            updateDiceInfo();
        }

        function playDice(type) {
            let bet = parseFloat(dBet.value);
            let chance = parseFloat(dChance.value);
            if(bet > balance || bet <= 0) return alert("Баланс!");
            balance -= bet; updateBal();

            let roll = Math.floor(Math.random() * 1000000);
            let threshold = Math.floor(chance * 10000);
            let win = (type === 'less') ? (roll < threshold) : (roll >= (1000000 - threshold));

            showResult(roll, win);
            if(win) { balance += bet * (97/chance); updateBal(); }
        }

        // --- ЛОГИКА МИНЫ ---
        let bombPos = [];
        let mActive = false;
        let mOpened = 0;
        let mBet = 0;

        function createMinesGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => clickMine(i); g.appendChild(c);
            }
        }

        function startMines() {
            let b = parseFloat(document.getElementById('mines-bet').value);
            let count = parseInt(document.getElementById('mines-bombs').value);
            if(b > balance || count < 2 || count > 24) return alert("Ошибка данных!");
            
            balance -= b; mBet = b; updateBal();
            mActive = true; mOpened = 0; bombPos = [];
            while(bombPos.length < count) {
                let r = Math.floor(Math.random()*25);
                if(!bombPos.includes(r)) bombPos.push(r);
            }
            document.getElementById('mines-start').style.display = 'none';
            document.getElementById('mines-cashout').style.display = 'block';
            document.getElementById('mines-exit').style.display = 'none';
            updateMinesUI(); createMinesGrid();
        }

        function clickMine(i) {
            if(!mActive) return;
            const cells = document.querySelectorAll('.cell');
            if(cells[i].classList.contains('win')) return;

            if(bombPos.includes(i)) {
                endMines(false);
            } else {
                cells[i].classList.add('win'); cells[i].innerText = '💎';
                mOpened++; updateMinesUI();
            }
        }

        function getMult(opened) {let bombs = bombPos.length;
            function fact(n, k) { 
                let res = 1; for(let i=1; i<=k; i++) res = res * (n-i+1)/i;
                return res;
            }
            let prob = fact(25-opened, bombs) / fact(25, bombs);
            return (0.97 / prob);
        }

        function updateMinesUI() {
            let cur = getMult(mOpened);
            let next = getMult(mOpened + 1);
            document.getElementById('mines-mult-display').innerText = `x${cur.toFixed(2)}`;
            document.getElementById('next-step').innerText = `Следующий шаг: x${next.toFixed(2)} (+${(mBet*next - mBet*cur).toFixed(2)}₽)`;
            document.getElementById('mines-cashout').innerText = `ЗАБРАТЬ ${(mBet*cur).toFixed(2)}₽`;
        }

        function cashoutMines() {
            balance += mBet * getMult(mOpened); updateBal();
            endMines(true);
        }

        function endMines(win) {
            mActive = false;
            const cells = document.querySelectorAll('.cell');
            bombPos.forEach(p => { cells[p].innerText = '💣'; cells[p].classList.add('lose'); });
            document.getElementById('mines-start').style.display = 'block';
            document.getElementById('mines-cashout').style.display = 'none';
            document.getElementById('mines-exit').style.display = 'block';
        }

        function showResult(val, win) {
            const o = document.getElementById('result-overlay');
            o.innerText = val; o.style.display = 'block';
            o.style.background = win ? '#2ecc71' : '#e74c3c';
            setTimeout(() => o.style.display = 'none', 2000);
        }

        updateDiceInfo();
    </script>
</body>
</html>
